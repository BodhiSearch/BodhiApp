name: Publish Docker MT CPU Image

on:
  push:
    tags:
      - 'docker-mt/v*'
      - 'docker-mt-dev/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker MT tag (e.g., docker-mt-dev/v0.0.1)'
        required: true
        type: string

# Prevent concurrent releases
concurrency:
  group: publish-docker-mt-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  CI: true
  REGISTRY: ghcr.io
  IMAGE_NAME_RAW: ${{ github.repository }}

jobs:
  # Extract version information
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.version.outputs.tag_version }}
      build_variant: ${{ steps.version.outputs.build_variant }}
      image_suffix: ${{ steps.version.outputs.image_suffix }}
      is_development: ${{ steps.version.outputs.is_development }}
      image_name: ${{ steps.version.outputs.image_name }}
      app_version: ${{ steps.version.outputs.app_version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
      release_tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate release tag
        uses: ./.github/actions/validate-release-tag
        with:
          tag: ${{ steps.release.outputs.tag }}
          pattern: '^docker-mt(-dev)?/v[0-9]+\.[0-9]+\.[0-9]+$'
          pattern-description: 'docker-mt/vX.Y.Z or docker-mt-dev/vX.Y.Z'

      - name: Extract version information
        id: version
        run: |
          # Convert repository name to lowercase for Docker registry
          IMAGE_NAME=$(echo "${{ env.IMAGE_NAME_RAW }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

          # Use the validated tag
          GITHUB_REF="refs/tags/${{ steps.release.outputs.tag }}"

          # Extract the version and variant from the tag
          if [[ $GITHUB_REF == refs/tags/docker-mt/v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/docker-mt/v}
            APP_VERSION=${GITHUB_REF#refs/tags/}
            BUILD_VARIANT="production"
            IMAGE_SUFFIX=""
            IS_DEVELOPMENT="false"
          elif [[ $GITHUB_REF == refs/tags/docker-mt-dev/v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/docker-mt-dev/v}
            APP_VERSION=${GITHUB_REF#refs/tags/}
            BUILD_VARIANT="development"
            IMAGE_SUFFIX="-development"
            IS_DEVELOPMENT="true"
          else
            echo "Error: Unsupported tag format: $GITHUB_REF"
            exit 1
          fi
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "build_variant=$BUILD_VARIANT" >> $GITHUB_OUTPUT
          echo "image_suffix=$IMAGE_SUFFIX" >> $GITHUB_OUTPUT
          echo "is_development=$IS_DEVELOPMENT" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT

  # Build BodhiApp binary (AMD64 only)
  build-app-binary:
    needs: extract-version
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 120
    outputs:
      app_binary_tag: ${{ steps.set-tag.outputs.app_binary_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app-binary image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./devops/app-binary.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:app-binary-mt-${{ needs.extract-version.outputs.tag_version }}${{ needs.extract-version.outputs.image_suffix }}
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:app-binary-mt-latest${{ needs.extract-version.outputs.image_suffix }}
          cache-from: |
            type=gha,scope=app-binary-mt-${{ needs.extract-version.outputs.build_variant }}
            type=gha,scope=app-binary-mt-deps
          cache-to: |
            type=gha,mode=max,scope=app-binary-mt-${{ needs.extract-version.outputs.build_variant }}
            type=gha,mode=max,scope=app-binary-mt-deps
          build-args: |
            BUILD_VARIANT=${{ needs.extract-version.outputs.build_variant }}
            BODHI_VERSION=${{ needs.extract-version.outputs.app_version }}
            BODHI_COMMIT_SHA=${{ needs.extract-version.outputs.commit_sha }}
            CI_DOCKER=true

      - name: Set app binary tag output
        id: set-tag
        run: |
          APP_BINARY_TAG="${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:app-binary-mt-${{ needs.extract-version.outputs.tag_version }}${{ needs.extract-version.outputs.image_suffix }}"
          echo "app_binary_tag=$APP_BINARY_TAG" >> $GITHUB_OUTPUT

  # Build multi-tenant image (AMD64 only)
  build-multi-tenant:
    needs: [extract-version, build-app-binary]
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-tenant image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./devops/multi-tenant.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:${{ needs.extract-version.outputs.tag_version }}-multi-tenant${{ needs.extract-version.outputs.image_suffix }}
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:latest-multi-tenant${{ needs.extract-version.outputs.image_suffix }}
          cache-from: |
            type=gha,scope=multi-tenant-mt-${{ needs.extract-version.outputs.build_variant }}
            type=gha,scope=multi-tenant-mt-deps
          cache-to: |
            type=gha,mode=max,scope=multi-tenant-mt-${{ needs.extract-version.outputs.build_variant }}
            type=gha,mode=max,scope=multi-tenant-mt-deps
          build-args: |
            BUILD_VARIANT=${{ needs.extract-version.outputs.build_variant }}
            BODHI_VERSION=${{ needs.extract-version.outputs.app_version }}
            BODHI_COMMIT_SHA=${{ needs.extract-version.outputs.commit_sha }}
            APP_BINARY_IMAGE=${{ needs.build-app-binary.outputs.app_binary_tag }}
            CI_DOCKER=true

      - name: Verify published image
        run: |
          TAG="${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:${{ needs.extract-version.outputs.tag_version }}-multi-tenant${{ needs.extract-version.outputs.image_suffix }}"
          echo "Verifying image: $TAG"
          docker manifest inspect "$TAG"

      - name: Output image details
        run: |
          TAG="${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:${{ needs.extract-version.outputs.tag_version }}-multi-tenant${{ needs.extract-version.outputs.image_suffix }}"
          LATEST_TAG="${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image_name }}:latest-multi-tenant${{ needs.extract-version.outputs.image_suffix }}"
          echo "::notice title=Multi-Tenant Image Published::${TAG}"
          echo "::notice title=Latest Tag::${LATEST_TAG}"
          echo "::notice title=Pull Command::docker pull ${TAG}"
