<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bodhi · MCP Discover</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="bodhi-sidebar.js"></script>
<style>
:root {
  --c-indigo-bg:    rgba(62,74,168,.10);
  --c-indigo-bd:    rgba(62,74,168,.22);
  --c-indigo-text:  #3E4AA8;
  --c-lotus-bg:     rgba(255,164,184,.14);
  --c-lotus-bd:     rgba(255,164,184,.35);
  --c-lotus-text:   #B02A52;
  --c-saffron-bg:   rgba(250,138,46,.12);
  --c-saffron-bd:   rgba(250,138,46,.28);
  --c-saffron-text: #B4500A;
  --c-leaf-bg:      rgba(91,178,59,.12);
  --c-leaf-bd:      rgba(91,178,59,.28);
  --c-leaf-text:    #2F7D1F;
  --c-teal-bg:      rgba(30,157,143,.10);
  --c-teal-bd:      rgba(30,157,143,.25);
  --c-teal-text:    #0F6F67;
  --c-muted-bg:     hsl(var(--muted));
  --c-muted-bd:     hsl(var(--border));
  --c-muted-text:   hsl(var(--muted-foreground));
  --c-connected-bg:   rgba(46,188,64,.10);
  --c-connected-bd:   rgba(46,188,64,.25);
  --c-connected-text: #2a9b36;
  --c-pending-bg:     rgba(250,138,46,.10);
  --c-pending-bd:     rgba(250,138,46,.25);
  --c-pending-text:   #B4500A;
}
[data-theme="dark"] {
  --c-indigo-bg: rgba(110,123,204,.18); --c-indigo-bd: rgba(110,123,204,.30); --c-indigo-text: #A5AEE6;
  --c-lotus-bg: rgba(255,164,184,.15); --c-lotus-bd: rgba(255,164,184,.28); --c-lotus-text: #FFA4B8;
  --c-saffron-bg: rgba(250,138,46,.18); --c-saffron-bd: rgba(250,138,46,.30); --c-saffron-text: #FFAB5C;
  --c-leaf-bg: rgba(139,217,99,.16); --c-leaf-bd: rgba(139,217,99,.28); --c-leaf-text: #8BD963;
  --c-teal-bg: rgba(30,200,180,.12); --c-teal-bd: rgba(30,200,180,.22); --c-teal-text: #1CCFBC;
  --c-connected-bg: rgba(139,217,99,.12); --c-connected-bd: rgba(139,217,99,.25); --c-connected-text: #8BD963;
  --c-pending-bg: rgba(250,138,46,.14); --c-pending-bd: rgba(250,138,46,.28); --c-pending-text: #FFAB5C;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font-sans); color: hsl(var(--foreground)); background: hsl(var(--background)); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; }
a { text-decoration: none; color: inherit; }

.app { display: grid; grid-template-columns: 220px 1fr 380px; grid-template-rows: 100vh; height: 100vh; overflow: hidden; transition: grid-template-columns 220ms cubic-bezier(.22,.61,.36,1); }
.app.side-collapsed { grid-template-columns: 0px 1fr 380px; }
.app.panel-collapsed { grid-template-columns: 220px 1fr 0px; }
.app.side-collapsed.panel-collapsed { grid-template-columns: 0px 1fr 0px; }

/* ── SHARED PRIMITIVES ── */
.icon-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid hsl(var(--border)); background: transparent; display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground)); transition: background 120ms, color 120ms; flex: none; }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.icon-btn.active { background: hsl(var(--foreground)); color: hsl(var(--background)); border-color: transparent; }

.pill-btn { height: 30px; padding: 0 12px; border-radius: 7px; display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 600; border: none; transition: background 120ms, color 120ms, transform 60ms; }
.pill-btn:active { transform: scale(.97); }
.pill-btn svg { width: 13px; height: 13px; }
.pill-btn-ghost { background: transparent; border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); }
.pill-btn-ghost:hover { background: hsl(var(--muted)); }
.pill-btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
.pill-btn-primary:hover { background: hsl(var(--primary-hover)); color: #fff; }

.tag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 5px; border: 1px solid; white-space: nowrap; }
.tag-indigo  { background: var(--c-indigo-bg);  border-color: var(--c-indigo-bd);  color: var(--c-indigo-text); }
.tag-lotus   { background: var(--c-lotus-bg);   border-color: var(--c-lotus-bd);   color: var(--c-lotus-text); }
.tag-saffron { background: var(--c-saffron-bg); border-color: var(--c-saffron-bd); color: var(--c-saffron-text); }
.tag-leaf    { background: var(--c-leaf-bg);    border-color: var(--c-leaf-bd);    color: var(--c-leaf-text); }
.tag-teal    { background: var(--c-teal-bg);    border-color: var(--c-teal-bd);    color: var(--c-teal-text); }
.tag-muted   { background: var(--c-muted-bg);   border-color: var(--c-muted-bd);   color: var(--c-muted-text); }

/* ── SIDEBAR ── */
.side { background: hsl(var(--card)); border-right: 1px solid hsl(var(--border)); display: flex; flex-direction: column; overflow: hidden; z-index: 30; transition: border-color 220ms cubic-bezier(.22,.61,.36,1); }
.app.side-collapsed .side { border-right-color: transparent; }
.side-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px 8px 16px; }
.side-scroll::-webkit-scrollbar { width: 4px; }
.side-scroll::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 2px; }
.logo { display: flex; align-items: center; gap: 10px; padding: 13px 12px 12px; border-bottom: 1px solid hsl(var(--border)); flex-shrink: 0; }
.logo img { width: 28px; height: 28px; flex: none; }
.logo-t { font-size: 15px; font-weight: 700; letter-spacing: -.01em; line-height: 1; }
.logo-s { font-family: var(--font-mono); font-size: 9px; letter-spacing: .14em; color: hsl(var(--muted-foreground)); text-transform: uppercase; margin-top: 2px; }
.nav-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; color: hsl(var(--muted-foreground)); transition: background 100ms, color 100ms; }
.nav-row svg { width: 14px; height: 14px; flex: none; }
.nav-row:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); cursor: pointer; }
.nav-row.active { background: var(--c-lotus-bg); color: var(--c-lotus-text); font-weight: 600; }
.nav-row.active svg { color: #DB456C; }
.nav-row .nb { margin-left: auto; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 99px; background: var(--c-lotus-bg); color: var(--c-lotus-text); }
.nav-sub { padding-left: 10px; margin-top: 1px; }
.nav-sub-row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 7px; font-size: 12.5px; font-weight: 500; color: hsl(var(--muted-foreground)); transition: background 100ms, color 100ms; cursor: pointer; }
.nav-sub-row:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.nav-sub-row.active { color: var(--c-lotus-text); font-weight: 600; }
.nav-sub-row svg { width: 13px; height: 13px; flex: none; }
.nav-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
.nav-badge.approval { background: var(--c-saffron-bg); color: var(--c-saffron-text); border: 1px solid var(--c-saffron-bd); }
.sec-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: .1em; color: hsl(var(--muted-foreground)); font-weight: 700; padding: 12px 10px 5px; display: flex; align-items: center; justify-content: space-between; }
.sec-label .clr { font-size: 10px; font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--c-lotus-text); background: none; border: none; padding: 0; }
.sec-label .clr:hover { text-decoration: underline; }
.fc-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 2px 6px 4px; }
.fc { font-size: 11.5px; font-weight: 500; padding: 3px 9px; border-radius: 99px; border: 1px solid hsl(var(--border)); background: transparent; color: hsl(var(--muted-foreground)); transition: all 100ms; }
.fc:hover { border-color: hsl(var(--ring)); color: hsl(var(--foreground)); background: hsl(var(--muted)); }
.fc.fc-indigo.on  { background: var(--c-indigo-bg);  border-color: var(--c-indigo-bd);  color: var(--c-indigo-text); }
.fc.fc-lotus.on   { background: var(--c-lotus-bg);   border-color: var(--c-lotus-bd);   color: var(--c-lotus-text); }
.fc.fc-saffron.on { background: var(--c-saffron-bg); border-color: var(--c-saffron-bd); color: var(--c-saffron-text); }
.fc.fc-leaf.on    { background: var(--c-leaf-bg);    border-color: var(--c-leaf-bd);    color: var(--c-leaf-text); }
.fc.fc-teal.on    { background: var(--c-teal-bg);    border-color: var(--c-teal-bd);    color: var(--c-teal-text); }
.fc.fc-neutral.on { background: hsl(var(--muted));   border-color: hsl(var(--border));  color: hsl(var(--foreground)); font-weight: 600; }

/* ── MAIN ── */
.main { display: flex; flex-direction: column; min-width: 0; overflow: hidden; background: hsl(var(--background)); }
.header { display: flex; align-items: center; gap: 10px; padding: 0 16px; border-bottom: 1px solid hsl(var(--border)); background: hsl(var(--card)); height: 52px; flex-shrink: 0; }
.header-logo { display: none; }
.header-logo img { width: 24px; height: 24px; }
.breadcrumb { display: flex; align-items: center; gap: 5px; font-size: 12.5px; color: hsl(var(--muted-foreground)); min-width: 0; overflow: hidden; }
.breadcrumb .sep { width: 10px; height: 10px; flex: none; opacity: .5; }
.breadcrumb .bc-seg { cursor: pointer; white-space: nowrap; }
.breadcrumb .bc-seg:hover { color: hsl(var(--foreground)); }
.breadcrumb .bc-current { font-weight: 700; color: var(--c-lotus-text); white-space: nowrap; }
.header-mid { flex: 1; min-width: 0; overflow: hidden; }
.head-actions { display: flex; align-items: center; gap: 6px; flex: none; }
.scope-row { display: flex; align-items: center; gap: 2px; padding: 10px 16px 0; flex-shrink: 0; }
.scope-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; background: transparent; color: hsl(var(--muted-foreground)); transition: all 120ms; }
.scope-btn .cnt { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 99px; background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }
.scope-btn:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.scope-btn.on { background: hsl(var(--foreground)); color: hsl(var(--background)); font-weight: 700; border-radius: 8px; }
.scope-btn.on .cnt { background: rgba(255,255,255,.15); color: rgba(255,255,255,.75); }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px 8px; flex-shrink: 0; }
.search-box { flex: 1; min-width: 0; position: relative; }
.search-box svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: hsl(var(--muted-foreground)); pointer-events: none; }
.search-box input { width: 100%; padding: 6px 10px 6px 30px; border: 1px solid hsl(var(--border)); border-radius: 7px; font-size: 13px; font-family: inherit; background: hsl(var(--card)); color: hsl(var(--foreground)); outline: none; transition: border-color 120ms, box-shadow 120ms; }
.search-box input::placeholder { color: hsl(var(--muted-foreground)); }
.search-box input:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px rgba(255,164,184,.15); }
.tb-btn { height: 32px; padding: 0 11px; border-radius: 7px; border: 1px solid hsl(var(--border)); background: hsl(var(--card)); display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 500; color: hsl(var(--foreground)); white-space: nowrap; flex-shrink: 0; transition: background 120ms; }
.tb-btn svg { width: 13px; height: 13px; color: hsl(var(--muted-foreground)); }
.tb-btn:hover { background: hsl(var(--muted)); }
.tb-btn.active { background: hsl(var(--foreground)); color: hsl(var(--background)); border-color: transparent; }
.tb-btn.active svg { color: hsl(var(--background)); }
.status-bar { display: flex; align-items: center; gap: 4px; padding: 0 16px 10px; flex-shrink: 0; overflow-x: auto; }
.status-bar::-webkit-scrollbar { display: none; }
.stab { padding: 4px 11px; border-radius: 99px; border: 1px solid hsl(var(--border)); font-size: 12px; font-weight: 500; background: transparent; color: hsl(var(--muted-foreground)); white-space: nowrap; transition: all 120ms; position: relative; }
.stab:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.stab.on { background: hsl(var(--foreground)); color: hsl(var(--background)); border-color: transparent; font-weight: 600; }
.stab.st-connected.on  { background: var(--c-connected-bg); color: var(--c-connected-text); border-color: var(--c-connected-bd); }
.stab.st-approved.on   { background: var(--c-indigo-bg); color: var(--c-indigo-text); border-color: var(--c-indigo-bd); }
.stab.st-pending.on    { background: var(--c-pending-bg); color: var(--c-pending-text); border-color: var(--c-pending-bd); }
.stab .stab-badge { position: absolute; top: -5px; right: -5px; min-width: 16px; height: 16px; border-radius: 99px; background: var(--c-saffron-text); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

/* ── CONTENT ── */
.content-area { flex: 1; overflow-y: auto; min-height: 0; }
.content-area::-webkit-scrollbar { width: 5px; }
.content-area::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 3px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 14px 16px 24px; }
.mcp-card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 140ms, box-shadow 140ms, background 80ms; display: flex; flex-direction: column; gap: 10px; position: relative; }
.mcp-card:hover { border-color: hsl(var(--ring)); box-shadow: var(--shadow-md); }
.mcp-card.active { border-color: #FFA4B8; background: var(--c-lotus-bg); box-shadow: 0 0 0 3px rgba(255,164,184,.15); }
.mcp-card.status-connected { border-left: 3px solid var(--c-connected-text); }
.mcp-card.status-pending { border-left: 3px solid #FA8A2E; }
.mcp-card.status-disabled { opacity: .65; }
.card-head { display: flex; align-items: flex-start; gap: 10px; }
.card-icon { width: 38px; height: 38px; border-radius: 9px; border: 1px solid hsl(var(--border)); background: hsl(var(--muted)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex: none; overflow: hidden; }
.card-title-block { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 700; letter-spacing: -.015em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-publisher { font-size: 11.5px; color: hsl(var(--muted-foreground)); margin-top: 1px; display: flex; align-items: center; gap: 4px; }
.card-publisher svg { width: 10px; height: 10px; }
.card-desc { font-size: 12.5px; line-height: 1.55; color: hsl(var(--muted-foreground)); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.card-meta-item { display: flex; align-items: center; gap: 4px; font-size: 11.5px; font-family: var(--font-mono); color: hsl(var(--muted-foreground)); }
.card-meta-item svg { width: 11px; height: 11px; }
.card-instances { display: flex; flex-direction: column; gap: 4px; }
.card-instance-row { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); border-radius: 7px; padding: 5px 8px; display: flex; align-items: center; gap: 6px; }
.inst-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.inst-dot.connected { background: var(--c-connected-text); }
.inst-dot.pending   { background: #FA8A2E; }
.inst-name { font-weight: 600; font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.inst-time { color: hsl(var(--muted-foreground)); font-size: 11px; flex-shrink: 0; }
.inst-play-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--c-connected-bd); background: var(--c-connected-bg); color: var(--c-connected-text); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 120ms; }
.inst-play-btn:hover { background: var(--c-connected-text); color: #fff; }
.inst-play-btn svg { width: 11px; height: 11px; }
.card-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 2px; }
.card-status-line { font-size: 11.5px; color: hsl(var(--muted-foreground)); display: flex; align-items: center; gap: 4px; }
.card-status-line svg { width: 11px; height: 11px; }
.status-approved { color: var(--c-indigo-text); }
.status-pending  { color: var(--c-pending-text); }

.cta { height: 28px; padding: 0 12px; border-radius: 99px; font-size: 12px; font-weight: 600; border: none; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; transition: all 120ms; flex-shrink: 0; }
.cta:active { transform: scale(.95); }
.cta svg { width: 11px; height: 11px; }
.cta-configure { background: var(--c-indigo-bg); border: 1px solid var(--c-indigo-bd); color: var(--c-indigo-text); }
.cta-configure:hover { background: var(--c-indigo-text); color: #fff; }
.cta-connect { background: #FFA4B8; color: #12142B; }
.cta-connect:hover { background: #DB456C; color: #fff; }
.cta-add { background: var(--c-leaf-bg); border: 1px solid var(--c-leaf-bd); color: var(--c-leaf-text); }
.cta-add:hover { background: var(--c-leaf-text); color: #fff; }
.cta-view { background: var(--c-connected-bg); border: 1px solid var(--c-connected-bd); color: var(--c-connected-text); }
.cta-view:hover { background: var(--c-connected-text); color: #fff; }
.cta-submit { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); }
.cta-submit:hover { background: hsl(var(--muted)); }
.cta-unavail { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); color: hsl(var(--muted-foreground)); cursor: default; }
.cta-approval-pending { background: var(--c-saffron-bg); border: 1px solid var(--c-saffron-bd); color: var(--c-saffron-text); cursor: default; }

/* ── LIST VIEW ── */
.mcp-list { display: flex; flex-direction: column; }
.list-head { display: flex; align-items: center; padding: 7px 16px; border-bottom: 1px solid hsl(var(--border)); flex-shrink: 0; position: sticky; top: 0; background: hsl(var(--background)); z-index: 5; }
.lh-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: hsl(var(--muted-foreground)); }
.lh-icon { width: 44px; flex-shrink: 0; }
.lh-name { flex: 1; min-width: 0; }
.lh-cat  { width: 120px; flex-shrink: 0; display: none; }
.lh-tools{ width: 72px; flex-shrink: 0; text-align: center; }
.lh-auth { width: 80px; flex-shrink: 0; }
.lh-stat { width: 110px; flex-shrink: 0; }
.lh-act  { width: 150px; flex-shrink: 0; }
@media (min-width: 900px) { .lh-cat { display: block; } }
.m-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid hsl(var(--border)); cursor: pointer; transition: background 80ms; }
.m-row:hover  { background: hsl(var(--muted)); }
.m-row.active { background: var(--c-lotus-bg); }
.m-row.status-connected { border-left: 3px solid var(--c-connected-text); padding-left: 13px; }
.m-row.status-pending   { border-left: 3px solid #FA8A2E; padding-left: 13px; }
.m-row.status-disabled  { opacity: .65; }
.row-icon { width: 44px; flex-shrink: 0; }
.row-icon-box { width: 30px; height: 30px; border-radius: 7px; border: 1px solid hsl(var(--border)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.row-body { flex: 1; min-width: 0; }
.row-name { font-size: 13.5px; font-weight: 600; letter-spacing: -.015em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-pub { font-size: 11.5px; color: hsl(var(--muted-foreground)); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.row-cat { width: 120px; flex-shrink: 0; display: none; }
@media (min-width: 900px) { .row-cat { display: flex; align-items: center; } }
.row-tools { width: 72px; flex-shrink: 0; text-align: center; }
.row-tools-val { font-size: 12px; font-family: var(--font-mono); font-weight: 600; }
.row-tools-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: hsl(var(--muted-foreground)); }
.row-auth { width: 80px; flex-shrink: 0; }
.row-stat { width: 110px; flex-shrink: 0; }

.form-select:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px rgba(255,164,184,.15); }

.form-toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 10px; border: 1px solid hsl(var(--border)); border-radius: 8px; background: hsl(var(--background)); }

}

  .card-grid { grid-template-columns: 1fr; padding: 10px 12px 20px; gap: 10px; }
  .panel { width: 100%; }
}

/* ══ STATE ══ */
let currentView = 'cards';
let currentStab = 'all';
let activeServer = null;
let activePanelTab = 'about';
let userRole = 'user';

/* ══ HELPERS ══ */
function authBadges(auths) {
  return auths.map(a => {
    if (a === 'oauth') return `<span class="auth-badge auth-oauth"><i data-lucide="lock"></i>OAuth</span>`;
    if (a === 'key')   return `<span class="auth-badge auth-key"><i data-lucide="key"></i>API Key</span>`;
    return `<span class="auth-badge auth-none"><i data-lucide="unlock"></i>Public</span>`;
  }).join(' ');
}

function catBadge(s) {
  return `<span class="tag ${s.catClass}" style="font-size:10.5px;padding:2px 8px;">${s.category}</span>`;
}

function statusClass(s) {
  if (s.disabled) return 'status-disabled';
  const hasConnected = s.userInstances.some(i => i.status === 'connected');
  const hasPending   = s.userInstances.some(i => i.status === 'pending');
  if (hasConnected) return 'status-connected';
  if (hasPending)   return 'status-pending';
  return '';
}

function userStatusSummary(s) {
  if (s.disabled) return 'disabled';
  const connected = s.userInstances.filter(i => i.status === 'connected');
  const pending   = s.userInstances.filter(i => i.status === 'pending');
  if (connected.length) return 'connected';
  if (pending.length)   return 'pending';
  if (s.adminApproved)  return 'approved';
  return 'not';
}

function statusLine(s) {
  const st = userStatusSummary(s);
  if (st === 'disabled') return `<span class="card-status-line" style="color:hsl(var(--muted-foreground))"><i data-lucide="ban"></i>Admin disabled</span>`;
  if (st === 'connected') return `<span class="card-status-line" style="color:var(--c-connected-text)"><i data-lucide="circle-check"></i>${s.userInstances.filter(i=>i.status==='connected').length} instance(s)</span>`;
  if (st === 'pending')   return `<span class="card-status-line" style="color:var(--c-pending-text)"><i data-lucide="clock"></i>Pending</span>`;
  if (st === 'approved')  return `<span class="card-status-line status-approved"><i data-lucide="shield-check"></i>admin-approved</span>`;
  return `<span class="card-status-line"><i data-lucide="minus-circle"></i>not yet in this app</span>`;
}

function ctaBtn(s) {
  if (s.disabled) return `<button class="cta cta-unavail" disabled>Unavailable</button>`;
  const st = userStatusSummary(s);
  if (userRole === 'admin') {
    if (!s.adminApproved) {
      const cnt = s.approvalRequests.length;
      return `<button class="cta cta-configure" onclick="event.stopPropagation();openDetail(MCP_SERVERS.find(x=>x.id==='${s.id}'),'configure')"><i data-lucide="settings-2"></i>Configure${cnt?` (${cnt})`:''}${!s.adminApproved?' ·  approve':''}</button>`;
    }
    return `<button class="cta cta-configure" onclick="event.stopPropagation();openDetail(MCP_SERVERS.find(x=>x.id==='${s.id}'),'configure')"><i data-lucide="settings-2"></i>Configure</button>`;
  }
  // user role
  if (st === 'connected' || st === 'pending') {
    return `<button class="cta cta-view" onclick="event.stopPropagation();openDetail(MCP_SERVERS.find(x=>x.id==='${s.id}'),'connect')"><i data-lucide="plug"></i>My instances</button>`;
  }
  if (st === 'approved') return `<button class="cta cta-add" onclick="event.stopPropagation();openDetail(MCP_SERVERS.find(x=>x.id==='${s.id}'),'connect')"><i data-lucide="plus"></i>Connect</button>`;
  return `<button class="cta cta-submit" onclick="event.stopPropagation()"><i data-lucide="send"></i>Request Approval</button>`;
}

function matchesFilter(s) {
  if (currentStab === 'connected') { if (s.userInstances.every(i => i.status !== 'connected')) return false; }
  if (currentStab === 'approved')  { if (!s.adminApproved) return false; }
  if (currentStab === 'pending')   { if (s.userInstances.every(i => i.status !== 'pending')) return false; }
  if (currentStab === 'not')       { if (s.userInstances.some(i => i.status === 'connected' || i.status === 'pending')) return false; }
  if (currentStab === 'approval_req') { if (!s.approvalRequests.length) return false; }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    if (!s.name.toLowerCase().includes(q) && !s.publisher.toLowerCase().includes(q) && !s.category.toLowerCase().includes(q)) return false;
  }
  return true;
}

function totalApprovalRequests() {
  return MCP_SERVERS.reduce((n, s) => n + s.approvalRequests.length, 0);
}

/* ══ RENDER CARDS ══ */
function renderCards(servers) {
  const grid = document.createElement('div');
  grid.className = 'card-grid';
  servers.forEach(s => {
    const card = document.createElement('div');
    card.className = `mcp-card ${statusClass(s)}${activeServer?.id === s.id ? ' active' : ''}`;
    card.dataset.id = s.id;

    const instancesHtml = s.userInstances.length ? `
      <div class="card-instances">
        ${s.userInstances.map(inst => `
          <div class="card-instance-row">
            <span class="inst-dot ${inst.status}"></span>
            <span class="inst-name">${inst.name}</span>
            <span class="inst-time">${inst.time}</span>
            ${inst.status === 'connected' ? `<button class="inst-play-btn" onclick="event.stopPropagation();goToPlayground('${inst.id}','${inst.name}','${s.id}')" title="Open playground"><i data-lucide="play"></i></button>` : ''}
          </div>`).join('')}
      </div>` : '';

    card.innerHTML = `
      <div class="card-head">
        <div class="card-icon" style="background:${s.iconBg}">
          <span style="color:${s.iconColor};font-size:15px;font-weight:800">${s.icon}</span>
        </div>
        <div class="card-title-block">
          <div class="card-name">${s.name}</div>
          <div class="card-publisher">${s.publisher}${s.verified?'<i data-lucide="badge-check" style="width:10px;height:10px;color:var(--c-indigo-text)"></i>':''}</div>
        </div>
        ${catBadge(s)}
      </div>
      <div class="card-desc desc-text">${s.desc}</div>
      <div class="card-meta">
        <span class="card-meta-item"><i data-lucide="wrench"></i>${s.tools != null ? s.tools : '?'} tools</span>
        <span class="card-meta-item"><i data-lucide="download"></i>${s.installs}</span>
        ${authBadges(s.auth)}
        ${userRole==='admin' && s.approvalRequests.length ? `<span class="auth-badge" style="background:var(--c-saffron-bg);border-color:var(--c-saffron-bd);color:var(--c-saffron-text)"><i data-lucide="users"></i>${s.approvalRequests.length} request${s.approvalRequests.length>1?'s':''}</span>` : ''}
      </div>
      ${instancesHtml}
      <div class="card-foot">
        ${statusLine(s)}
        ${ctaBtn(s)}
      </div>`;
    card.onclick = () => openDetail(s);
    grid.appendChild(card);
  });
  return grid;
}

/* ══ RENDER LIST ══ */
function renderList(servers) {
  const wrap = document.createElement('div');
  wrap.className = 'mcp-list';
  const head = document.createElement('div');
  head.className = 'list-head';
  head.innerHTML = `<div class="lh-icon"></div><div class="lh-name lh-label">Server</div><div class="lh-cat lh-label">Category</div><div class="lh-tools lh-label">Tools</div><div class="lh-auth lh-label">Auth</div><div class="lh-stat lh-label">Status</div><div class="lh-act"></div>`;
  wrap.appendChild(head);
  servers.forEach(s => {
    const row = document.createElement('div');
    row.className = `m-row ${statusClass(s)}${activeServer?.id === s.id ? ' active' : ''}`;
    row.dataset.id = s.id;
    row.innerHTML = `
      <div class="row-icon"><div class="row-icon-box" style="background:${s.iconBg};color:${s.iconColor};border-color:${s.iconBg}">${s.icon}</div></div>
      <div class="row-body">
        <div class="row-name">${s.name}</div>
        <div class="row-pub">${s.publisher}${s.verified?'<i data-lucide="badge-check" style="width:10px;height:10px;color:var(--c-indigo-text)"></i>':''}</div>
      </div>
      <div class="row-cat">${catBadge(s)}</div>
      <div class="row-tools"><div class="row-tools-val">${s.tools != null ? s.tools : '?'}</div><div class="row-tools-lbl">tools</div></div>
      <div class="row-auth">${authBadges(s.auth)}</div>
      <div class="row-stat">${statusLine(s)}</div>
      <div class="row-act">${ctaBtn(s)}</div>`;
    row.onclick = () => openDetail(s);
    wrap.appendChild(row);
  });
  return wrap;
}

/* ══ MAIN RENDER ══ */
function render() {
  const servers = MCP_SERVERS.filter(matchesFilter);
  const area = document.getElementById('contentArea');
  area.innerHTML = '';
  if (!servers.length) {
    area.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:hsl(var(--muted-foreground))"><i data-lucide="search-x" style="width:28px;height:28px;opacity:.3"></i><div style="font-size:13px;font-weight:600">No servers match</div><div style="font-size:12px">Try adjusting filters or search</div></div>`;
    lucide.createIcons();
    return;
  }
  area.appendChild(currentView === 'cards' ? renderCards(servers) : renderList(servers));
  lucide.createIcons();
  updateApprovalBadges();
}

function updateApprovalBadges() {
  const cnt = totalApprovalRequests();
  const stab = document.getElementById('stab-approval-req');
  const badge = document.getElementById('approvalBadge');
  const navBadge = document.getElementById('approvalNavBadge');
  const adminRow = document.getElementById('adminNavRow');
  if (userRole === 'admin') {
    if (stab) stab.style.display = cnt ? '' : 'none';
    if (badge) badge.textContent = cnt;
    if (adminRow) adminRow.style.display = '';
    if (navBadge) { navBadge.style.display = cnt ? '' : 'none'; navBadge.textContent = cnt; }
  } else {
    if (stab) stab.style.display = 'none';
    if (adminRow) adminRow.style.display = 'none';
  }
}

/* ══ PANEL ══ */
function openDetail(s, defaultTab) {
  activeServer = s;
  activePanelTab = defaultTab || 'about';
  const desktop = window.innerWidth >= 1100;
  if (desktop) document.getElementById('app').classList.remove('panel-collapsed');
  document.querySelectorAll('.mcp-card, .m-row').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-id="${s.id}"]`);
  if (el) el.classList.add('active');

  const hasApprovalReqs = s.approvalRequests.length > 0;
  const isAdmin = userRole === 'admin';

  const configureTabHtml = isAdmin ? `
    <button class="ptab admin-tab${activePanelTab==='configure'?' on':''}" onclick="setPTab(this,'configure')">
      Configure${hasApprovalReqs?`<span class="ptab-dot"></span>`:''}
    </button>` : '';

  const connectTabLabel = isAdmin ? '' : `<button class="ptab${activePanelTab==='connect'?' on':''}" onclick="setPTab(this,'connect')">Connect</button>`;

  // Status summary
  const st = userStatusSummary(s);
  let statusPillHtml = '';
  if (s.disabled) {
    statusPillHtml = `<span class="auth-badge" style="background:hsl(var(--muted));border-color:hsl(var(--border));color:hsl(var(--muted-foreground))"><i data-lucide="ban"></i>Admin Disabled</span>`;
  } else if (st === 'connected') {
    statusPillHtml = `<span class="auth-badge" style="background:var(--c-connected-bg);border-color:var(--c-connected-bd);color:var(--c-connected-text)"><i data-lucide="circle-check"></i>Connected</span>`;
  } else if (st === 'pending') {
    statusPillHtml = `<span class="auth-badge" style="background:var(--c-pending-bg);border-color:var(--c-pending-bd);color:var(--c-pending-text)"><i data-lucide="clock"></i>Request pending</span>`;
  } else if (st === 'approved') {
    statusPillHtml = `<span class="auth-badge" style="background:var(--c-indigo-bg);border-color:var(--c-indigo-bd);color:var(--c-indigo-text)"><i data-lucide="shield-check"></i>Admin approved</span>`;
  } else if (!s.adminApproved && isAdmin) {
    statusPillHtml = `<span class="auth-badge" style="background:var(--c-saffron-bg);border-color:var(--c-saffron-bd);color:var(--c-saffron-text)"><i data-lucide="alert-circle"></i>Not configured</span>`;
  } else {
    statusPillHtml = `<span class="auth-badge auth-none"><i data-lucide="minus-circle"></i>Not in this app</span>`;
  }

  document.getElementById('panelContent').innerHTML = `
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="panel-head">
        <div class="panel-icon" style="background:${s.iconBg}">
          <span style="color:${s.iconColor};font-size:20px;font-weight:800">${s.icon}</span>
        </div>
        <div class="panel-head-right">
          <div class="panel-title">${s.name}</div>
          <div class="panel-pub">
            ${s.publisher}
            ${s.verified?'<i data-lucide="badge-check" style="width:11px;height:11px;color:var(--c-indigo-text)"></i>':''}
            <span style="margin:0 3px;opacity:.4">·</span>
            ${catBadge(s)}
          </div>
        </div>
        <button class="panel-close" onclick="closePanel()"><i data-lucide="x"></i></button>
      </div>
      <div class="panel-status-row">
        ${statusPillHtml}
        ${authBadges(s.auth)}
        <span class="auth-badge auth-none" style="margin-left:auto"><i data-lucide="download"></i>${s.installs}</span>
      </div>
      <div class="panel-tabs">
        <button class="ptab${activePanelTab==='about'?' on':''}" onclick="setPTab(this,'about')">About</button>
        <button class="ptab${activePanelTab==='capabilities'?' on':''}" onclick="setPTab(this,'capabilities')">Capabilities</button>
        <button class="ptab${activePanelTab==='connection'?' on':''}" onclick="setPTab(this,'connection')">Connection</button>
        ${connectTabLabel}
        ${configureTabHtml}
        <button class="ptab${activePanelTab==='metadata'?' on':''}" onclick="setPTab(this,'metadata')">Metadata</button>
      </div>
      <div class="panel-body" id="panelBody"></div>
      <div class="panel-foot" id="panelFoot"></div>
    </div>`;

  setPTabContent(activePanelTab);
  document.getElementById('panel').classList.add('open');
  if (!desktop) document.getElementById('scrim').classList.add('visible');
  lucide.createIcons();
}

function setPTab(btn, tab) {
  btn.closest('.panel-tabs').querySelectorAll('.ptab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  activePanelTab = tab;
  setPTabContent(tab);
}

function setPTabContent(tab) {
  const s = activeServer;
  if (!s) return;
  const body = document.getElementById('panelBody');
  const foot = document.getElementById('panelFoot');
  if (!body || !foot) return;

  if (tab === 'about') {
    body.innerHTML = `
      <div class="p-section">
        <div class="p-sec-lbl">Description</div>
        <div style="font-size:13px;line-height:1.6;color:hsl(var(--muted-foreground))">${s.desc}</div>
      </div>
      <div class="p-section">
        <div class="p-sec-lbl">Tools (${s.toolList.length}${s.tools == null ? '+' : ''})</div>
        <div class="tool-list">${s.toolList.map(t=>`<div class="tool-item"><div class="tool-name">${t.name}</div><div class="tool-desc">${t.desc}</div></div>`).join('')}</div>
      </div>
      <div class="p-section">
        <div class="p-sec-lbl">Stats (30d)</div>
        <div class="stat-grid">${Object.entries(s.stats).map(([k,v])=>`<div class="stat-box"><div class="stat-val">${v}</div><div class="stat-lbl">${k}</div></div>`).join('')}</div>
      </div>`;
    foot.innerHTML = buildFootAbout(s);

  } else if (tab === 'capabilities') {
    body.innerHTML = `
      <div class="p-section">
        <div class="p-sec-lbl">Exposed Tools</div>
        <div class="cap-chips">${s.toolList.map(t=>`<span class="tag tag-indigo" style="font-size:12px;padding:3px 9px;font-family:var(--font-mono)">${t.name}</span>`).join('')}</div>
      </div>
      <div class="p-section">
        <div class="p-sec-lbl">Transport</div>
        <div class="spec-table">
          <div class="spec-row"><span class="spec-k">protocol</span><span class="spec-v">${s.transport}</span></div>
          <div class="spec-row"><span class="spec-k">streaming</span><span class="spec-v">${s.transport==='streamable-http'?'Yes':'No'}</span></div>
        </div>
      </div>`;
    foot.innerHTML = buildFootAbout(s);

  } else if (tab === 'connection') {
    body.innerHTML = `
      <div class="p-section">
        <div class="p-sec-lbl">Endpoint</div>
        <div class="spec-table">
          <div class="spec-row"><span class="spec-k">URL</span><span class="spec-v" style="font-size:11px;word-break:break-all">${s.url}</span></div>
          <div class="spec-row"><span class="spec-k">Transport</span><span class="spec-v">${s.transport}</span></div>
        </div>
      </div>
      <div class="p-section">
        <div class="p-sec-lbl">Auth methods configured</div>
        ${s.authConfigs.length ? s.authConfigs.map(ac => authMethodRowHtml(ac)).join('') : `<div style="font-size:12.5px;color:hsl(var(--muted-foreground));padding:8px 0">${userRole==='admin'?'No auth configured yet. Use the Configure tab to add one.':'No authentication configured by admin.'}</div>`}
      </div>`;
    foot.innerHTML = buildFootAbout(s);

  } else if (tab === 'connect') {
    // User's connect tab — show existing instances + auth methods to create new one
    const hasInstances = s.userInstances.length > 0;
    const st = userStatusSummary(s);
    body.innerHTML = `
      ${hasInstances ? `
        <div class="p-section">
          <div class="p-sec-lbl">My Instances</div>
          ${s.userInstances.map(inst => `
            <div class="user-instance-row">
              <span class="ui-dot ${inst.status}"></span>
              <div class="ui-body">
                <div class="ui-name">${inst.name}</div>
                <div class="ui-meta">
                  <span>${inst.authType === 'oauth' ? 'OAuth' : inst.authType === 'key' ? 'API Key' : 'Public'}</span>
                  <span>·</span>
                  <span>${inst.time}</span>
                </div>
              </div>
              <div class="ui-actions">
                ${inst.status === 'connected' ? `<button class="ui-play-btn" onclick="goToPlayground('${inst.id}','${inst.name}','${s.id}')"><i data-lucide="play"></i>Playground</button>` : `<span style="font-size:11.5px;color:var(--c-pending-text);font-weight:600">Pending</span>`}
                <button class="ui-del-btn" onclick="deleteInstance('${inst.id}','${s.id}')" title="Delete instance"><i data-lucide="trash-2"></i></button>
              </div>
            </div>`).join('')}
        </div>` : ''}
      <div class="p-section">
        <div class="p-sec-lbl" style="display:flex;align-items:center;justify-content:space-between">
          <span>Connect with…</span>
        </div>
        ${s.adminApproved && s.authConfigs.length ? s.authConfigs.map(ac => authConnectRowHtml(ac, s)).join('') + publicConnectRow(s) : ''}
        ${!s.adminApproved ? `<div style="font-size:12.5px;color:hsl(var(--muted-foreground));padding:8px 0">This server is not yet approved by your admin. <button style="background:none;border:none;color:var(--c-lotus-text);font-size:12.5px;font-weight:600;cursor:pointer;padding:0" onclick="">Request Approval →</button></div>` : ''}
        ${s.adminApproved && !s.authConfigs.length ? `<div class="auth-connect-row" onclick="goToNewMCP('${s.id}','none')"><div class="acr-icon" style="background:var(--c-leaf-bg)"><i data-lucide="unlock" style="color:var(--c-leaf-text)"></i></div><div class="acr-body"><div class="acr-name">Public (No auth)</div><div class="acr-desc">Connect without authentication</div></div><div class="acr-arrow"><i data-lucide="chevron-right"></i></div></div>` : ''}
      </div>`;
    foot.innerHTML = '';

  } else if (tab === 'configure') {
    // Admin configure tab
    const hasRequests = s.approvalRequests.length > 0;
    body.innerHTML = `
      ${hasRequests ? `
        <div class="p-section">
          <div class="p-sec-lbl" style="display:flex;align-items:center;gap:6px">
            <span>Approval Requests</span>
            <span style="background:var(--c-saffron-bg);border:1px solid var(--c-saffron-bd);color:var(--c-saffron-text);font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px">${s.approvalRequests.length}</span>
          </div>
          ${s.approvalRequests.map(req => `
            <div class="approval-request-row">
              <div class="arr-avatar">${req.initials}</div>
              <div class="arr-body">
                <div class="arr-email">${req.email}</div>
                <div class="arr-time">${req.time}</div>
              </div>
              <div class="arr-actions">
                <button class="arr-approve" onclick="approveRequest('${s.id}','${req.email}')">Approve</button>
                <button class="arr-reject" onclick="rejectRequest('${s.id}','${req.email}')">Reject</button>
              </div>
            </div>`).join('')}
        </div>
        <div class="form-divider"></div>` : ''}
      <div class="p-section">
        <div class="p-sec-lbl" style="display:flex;align-items:center;justify-content:space-between">
          <span>Server Status</span>
        </div>
        <div class="form-toggle-row">
          <div><div class="form-toggle-label">Enabled globally</div><div style="font-size:11.5px;color:hsl(var(--muted-foreground));margin-top:2px">Allow users to connect to this server</div></div>
          <div class="sw${!s.disabled?' on':''}" onclick="this.classList.toggle('on')"></div>
        </div>
        ${!s.adminApproved ? `
          <div class="form-toggle-row" style="margin-top:8px">
            <div><div class="form-toggle-label">Admin approved</div><div style="font-size:11.5px;color:hsl(var(--muted-foreground));margin-top:2px">Make visible and connectable to users</div></div>
            <div class="sw" id="approvedToggle" onclick="this.classList.toggle('on');toggleApproved('${s.id}')"></div>
          </div>` : `
          <div style="display:flex;align-items:center;gap:6px;margin-top:8px;padding:8px 10px;background:var(--c-leaf-bg);border:1px solid var(--c-leaf-bd);border-radius:8px;font-size:12.5px;font-weight:600;color:var(--c-leaf-text)">
            <i data-lucide="shield-check" style="width:13px;height:13px"></i> Approved &amp; active
          </div>`}
      </div>
      <div class="p-section">
        <div class="p-sec-lbl" style="display:flex;align-items:center;justify-content:space-between">
          <span>Authentication Methods</span>
          <button style="font-size:11.5px;font-weight:600;color:var(--c-indigo-text);background:none;border:none;display:flex;align-items:center;gap:3px" onclick="openConfigDrawer(activeServer)">
            <i data-lucide="plus" style="width:11px;height:11px"></i> Add
          </button>
        </div>
        ${s.authConfigs.length ? s.authConfigs.map((ac, i) => `
          <div class="auth-method-row">
            <div class="auth-method-icon" style="background:${ac.type==='oauth'?'var(--c-indigo-bg)':ac.type==='key'?'var(--c-saffron-bg)':'var(--c-leaf-bg)'}">
              <i data-lucide="${ac.type==='oauth'?'lock':ac.type==='key'?'key':'unlock'}" style="color:${ac.type==='oauth'?'var(--c-indigo-text)':ac.type==='key'?'var(--c-saffron-text)':'var(--c-leaf-text)'}"></i>
            </div>
            <div class="auth-method-body">
              <div class="auth-method-name">${ac.name}</div>
              <div class="auth-method-detail">${ac.detail}</div>
            </div>
            <div class="auth-method-actions">
              <button class="auth-method-btn" onclick="openConfigDrawer(activeServer,${i})" title="Edit"><i data-lucide="pencil"></i></button>
              <button class="auth-method-btn danger" onclick="deleteAuthConfig('${s.id}',${i})" title="Delete"><i data-lucide="trash-2"></i></button>
            </div>
          </div>`).join('') : `
          <div style="font-size:12.5px;color:hsl(var(--muted-foreground));padding:12px;border:1px dashed hsl(var(--border));border-radius:8px;text-align:center">
            No auth configured. Click <strong>Add</strong> to set up OAuth, API Key, or leave as Public.
          </div>`}
      </div>`;
    foot.innerHTML = `
      <button class="btn-full btn-indigo" onclick="openConfigDrawer(activeServer)"><i data-lucide="plus"></i> Add Auth Method</button>
      <button class="btn-full btn-ghost" style="font-size:12px" onclick="openConfigDrawer(activeServer,'edit-server')"><i data-lucide="settings-2"></i> Edit Server Details</button>`;

  } else if (tab === 'metadata') {
    body.innerHTML = `
      <div class="p-section">
        <div class="p-sec-lbl">Metadata</div>
        <div class="spec-table">
          <div class="spec-row"><span class="spec-k">license</span><span class="spec-v">${s.meta.license}</span></div>
          <div class="spec-row"><span class="spec-k">repo</span><span class="spec-v">${s.meta.repo}</span></div>
          <div class="spec-row"><span class="spec-k">publisher</span><span class="spec-v">${s.publisher}</span></div>
          <div class="spec-row"><span class="spec-k">verified</span><span class="spec-v">${s.verified?'✓ Yes':'No'}</span></div>
          <div class="spec-row"><span class="spec-k">transport</span><span class="spec-v">${s.transport}</span></div>
        </div>
      </div>`;
    foot.innerHTML = buildFootAbout(s);
  }
  lucide.createIcons();
}

function authMethodRowHtml(ac) {
  const icon = ac.type === 'oauth' ? 'lock' : ac.type === 'key' ? 'key' : 'unlock';
  const iconColor = ac.type === 'oauth' ? 'var(--c-indigo-text)' : ac.type === 'key' ? 'var(--c-saffron-text)' : 'var(--c-leaf-text)';
  const iconBg = ac.type === 'oauth' ? 'var(--c-indigo-bg)' : ac.type === 'key' ? 'var(--c-saffron-bg)' : 'var(--c-leaf-bg)';
  return `<div class="auth-method-row" style="cursor:default">
    <div class="auth-method-icon" style="background:${iconBg}"><i data-lucide="${icon}" style="color:${iconColor}"></i></div>
    <div class="auth-method-body"><div class="auth-method-name">${ac.name}</div><div class="auth-method-detail">${ac.detail}</div></div>
  </div>`;
}

function authConnectRowHtml(ac, s) {
  const icon = ac.type === 'oauth' ? 'lock' : ac.type === 'key' ? 'key' : 'unlock';
  const iconColor = ac.type === 'oauth' ? 'var(--c-indigo-text)' : ac.type === 'key' ? 'var(--c-saffron-text)' : 'var(--c-leaf-text)';
  const iconBg = ac.type === 'oauth' ? 'var(--c-indigo-bg)' : ac.type === 'key' ? 'var(--c-saffron-bg)' : 'var(--c-leaf-bg)';
  const label = ac.type === 'oauth' ? 'Connect with OAuth' : ac.type === 'key' ? 'Connect with API Key' : 'Connect (Public)';
  const desc = ac.type === 'oauth' ? 'Authorize via OAuth redirect' : ac.type === 'key' ? 'Provide your API key' : 'No authentication needed';
  return `<div class="auth-connect-row" onclick="goToNewMCP('${s.id}','${ac.type}')">
    <div class="acr-icon" style="background:${iconBg}"><i data-lucide="${icon}" style="color:${iconColor}"></i></div>
    <div class="acr-body"><div class="acr-name">${label}</div><div class="acr-desc">${desc}</div></div>
    <div class="acr-arrow"><i data-lucide="chevron-right"></i></div>
  </div>`;
}

function publicConnectRow(s) {
  // Public is always available
  const alreadyHasPublic = s.authConfigs.some(ac => ac.type === 'none');
  if (alreadyHasPublic) return '';
  return `<div class="auth-connect-row" onclick="goToNewMCP('${s.id}','none')">
    <div class="acr-icon" style="background:var(--c-leaf-bg)"><i data-lucide="unlock" style="color:var(--c-leaf-text)"></i></div>
    <div class="acr-body"><div class="acr-name">Connect (Public)</div><div class="acr-desc">No authentication required</div></div>
    <div class="acr-arrow"><i data-lucide="chevron-right"></i></div>
  </div>`;
}

function buildFootAbout(s) {
  if (s.disabled) return `<button class="btn-full btn-disabled" disabled><i data-lucide="ban"></i>Unavailable</button>`;
  const st = userStatusSummary(s);
  if (userRole === 'admin') {
    return `<button class="btn-full btn-indigo" onclick="setPTab(document.querySelector('.ptab.admin-tab'),'configure')"><i data-lucide="settings-2"></i> Configure Server</button>`;
  }
  if (st === 'connected' || st === 'pending') {
    return `<button class="btn-full btn-leaf" onclick="setPTab(document.querySelector('.ptab:nth-child(4)'),'connect')"><i data-lucide="plug"></i> Manage Instances</button>`;
  }
  if (st === 'approved') {
    return `<button class="btn-full btn-lotus" onclick="setPTab(document.querySelector('.ptab:nth-child(4)'),'connect')"><i data-lucide="plus"></i> Connect to this server</button>`;
  }
  return `<button class="btn-full btn-lotus"><i data-lucide="send"></i> Request Approval</button>`;
}

function closePanel() {
  if (window.innerWidth < 1100) {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('scrim').classList.remove('visible');
  }
  activeServer = null;
  document.querySelectorAll('.mcp-card, .m-row').forEach(el => el.classList.remove('active'));
}

/* ══ CONFIG DRAWER ══ */
function openConfigDrawer(s, editIndex) {
  const overlay = document.getElementById('configOverlay');
  const drawer  = document.getElementById('configDrawer');
  const icon    = document.getElementById('cdIcon');
  const title   = document.getElementById('cdTitle');
  const sub     = document.getElementById('cdSubtitle');
  const body    = document.getElementById('cdBody');
  const saveBtn = document.getElementById('cdSaveBtn');

  icon.style.background = s.iconBg;
  icon.innerHTML = `<span style="color:${s.iconColor};font-size:16px;font-weight:800">${s.icon}</span>`;

  if (editIndex === 'edit-server') {
    title.textContent = `Edit: ${s.name}`;
    sub.textContent = 'Update server URL, name, and settings';
    saveBtn.innerHTML = '<i data-lucide="check"></i> Save Changes';
    body.innerHTML = buildServerEditForm(s);
  } else if (typeof editIndex === 'number') {
    const ac = s.authConfigs[editIndex];
    title.textContent = `Edit Auth: ${ac.name}`;
    sub.textContent = 'Update authentication configuration';
    saveBtn.innerHTML = '<i data-lucide="check"></i> Save Auth';
    body.innerHTML = buildAuthForm(s, ac);
  } else {
    title.textContent = `Add Auth for ${s.name}`;
    sub.textContent = 'Configure how users connect to this server';
    saveBtn.innerHTML = '<i data-lucide="check"></i> Save Auth';
    body.innerHTML = buildAuthForm(s, null);
  }

  document.getElementById('configScrim').classList.add('visible');
  drawer.classList.add('open');
  lucide.createIcons();
}

function buildServerEditForm(s) {
  return `
    <div class="form-field">
      <div class="form-label">URL <span class="req">*</span></div>
      <input class="form-input" value="${s.url}" placeholder="https://mcp.example.com/mcp">
      <div class="form-hint">The MCP server endpoint URL</div>
    </div>
    <div class="form-field">
      <div class="form-label">Name <span class="req">*</span></div>
      <input class="form-input" value="${s.name}">
    </div>
    <div class="form-field">
      <div class="form-label">Description <span class="hint">(optional)</span></div>
      <textarea class="form-textarea" placeholder="Optional description">${s.desc}</textarea>
    </div>
    <div class="form-field">
      <div class="form-toggle-row">
        <div><div class="form-toggle-label">Enabled globally</div><div style="font-size:11.5px;color:hsl(var(--muted-foreground));margin-top:1px">Allow users to connect</div></div>
        <div class="sw${!s.disabled?' on':''}" onclick="this.classList.toggle('on')"></div>
      </div>
    </div>`;
}

function buildAuthForm(s, existing) {
  const authType = existing?.type || 'oauth';
  return `
    <div class="form-field">
      <div class="form-label">Auth Type <span class="req">*</span></div>
      <select class="form-select" id="authTypeSelect" onchange="updateAuthFields(this.value)">
        <option value="oauth"${authType==='oauth'?' selected':''}>OAuth 2.0</option>
        <option value="key"${authType==='key'?' selected':''}>Header / Query Key</option>
        <option value="none"${authType==='none'?' selected':''}>Public (No auth)</option>
      </select>
    </div>
    <div class="form-field">
      <div class="form-label">Config Name <span class="req">*</span></div>
      <input class="form-input" id="authNameInput" value="${existing?.name||''}" placeholder="e.g. oauth-default">
      <div class="form-hint">Internal identifier for this auth config</div>
    </div>
    <div id="authTypeFields">${buildAuthTypeFields(authType, existing)}</div>`;
}

function buildAuthTypeFields(type, existing) {
  if (type === 'oauth') {
    return `
      <div class="form-divider"></div>
      <div class="form-section-head">OAuth Configuration</div>
      <div class="form-field">
        <div class="form-label">Registration Type</div>
        <select class="form-select">
          <option>Dynamic Registration</option>
          <option>Manual</option>
        </select>
      </div>
      <div class="form-field">
        <div class="form-label">Authorization Endpoint</div>
        <input class="form-input" placeholder="https://example.com/authorize" value="${existing?.authEndpoint||''}">
      </div>
      <div class="form-field">
        <div class="form-label">Token Endpoint</div>
        <input class="form-input" placeholder="https://example.com/token" value="${existing?.tokenEndpoint||''}">
      </div>
      <div class="form-field">
        <div class="form-label">Registration Endpoint <span class="hint">(dynamic only)</span></div>
        <input class="form-input" placeholder="https://example.com/register" value="${existing?.registrationEndpoint||''}">
      </div>
      <div class="form-field">
        <div class="form-label">Scopes <span class="hint">(optional)</span></div>
        <input class="form-input" placeholder="read write" value="${existing?.scopes||''}">
        <div class="form-hint">Space-separated list of OAuth scopes</div>
      </div>`;
  }
  if (type === 'key') {
    return `
      <div class="form-divider"></div>
      <div class="form-section-head">Key / Value Configuration</div>
      <div class="form-field">
        <div class="form-label">Inject Via</div>
        <select class="form-select">
          <option>Header</option>
          <option>Query Parameter</option>
        </select>
      </div>
      <div class="form-field">
        <div class="form-label">Key name <span class="req">*</span></div>
        <input class="form-input" placeholder="e.g. x-api-key or api_key" value="${existing?.keyName||''}">
        <div class="form-hint">The header or query param name that holds the key</div>
      </div>
      <div class="form-field">
        <div class="form-label">Example value hint <span class="hint">(optional)</span></div>
        <input class="form-input" placeholder="e.g. sk-..." value="">
        <div class="form-hint">Shown as placeholder to users when they enter their key</div>
      </div>`;
  }
  // none
  return `
    <div class="form-divider"></div>
    <div style="padding:12px;background:var(--c-leaf-bg);border:1px solid var(--c-leaf-bd);border-radius:8px;font-size:13px;color:var(--c-leaf-text)">
      <strong>Public access</strong> — no authentication required. All users with access to this app can connect without providing any credentials.
    </div>`;
}

function updateAuthFields(type) {
  document.getElementById('authTypeFields').innerHTML = buildAuthTypeFields(type, null);
  lucide.createIcons();
}

function closeConfigDrawer() {
  document.getElementById('configDrawer').classList.remove('open');
  document.getElementById('configScrim').classList.remove('visible');
}

function saveServerConfig() {
  // Simulate save
  closeConfigDrawer();
  // Re-render panel to show updated state
  if (activeServer) {
    const s = activeServer;
    // If it was the "add auth" drawer, pretend we added one
    const authType = document.getElementById('authTypeSelect')?.value;
    const authName = document.getElementById('authNameInput')?.value;
    if (authType && authName && !s.authConfigs.find(ac => ac.name === authName)) {
      const detail = authType === 'oauth' ? 'Dynamic registration' : authType === 'key' ? 'Header key' : 'Public access';
      s.authConfigs.push({type: authType, name: authName, detail});
      if (!s.adminApproved) { s.adminApproved = true; }
    }
    openDetail(s, 'configure');
    render();
  }
}

/* ══ ACTIONS ══ */
function goToPlayground(instanceId, instanceName, serverId) {
  const s = MCP_SERVERS.find(x => x.id === serverId);
  const url = `Bodhi MCP Playground.html?instance=${instanceId}&name=${encodeURIComponent(instanceName)}&server=${serverId}`;
  window.location.href = url;
}

function goToNewMCP(serverId, authType) {
  const url = `Bodhi MCP New Instance.html?server=${serverId}&auth=${authType}`;
  window.location.href = url;
}

function deleteInstance(instanceId, serverId) {
  const s = MCP_SERVERS.find(x => x.id === serverId);
  if (!s) return;
  if (!confirm(`Delete instance "${instanceId}"?`)) return;
  s.userInstances = s.userInstances.filter(i => i.id !== instanceId);
  openDetail(s, 'connect');
  render();
}

function deleteAuthConfig(serverId, index) {
  const s = MCP_SERVERS.find(x => x.id === serverId);
  if (!s) return;
  s.authConfigs.splice(index, 1);
  openDetail(s, 'configure');
  render();
}

function approveRequest(serverId, email) {
  const s = MCP_SERVERS.find(x => x.id === serverId);
  if (!s) return;
  s.approvalRequests = s.approvalRequests.filter(r => r.email !== email);
  s.adminApproved = true;
  openDetail(s, 'configure');
  render();
}

function rejectRequest(serverId, email) {
  const s = MCP_SERVERS.find(x => x.id === serverId);
  if (!s) return;
  s.approvalRequests = s.approvalRequests.filter(r => r.email !== email);
  openDetail(s, 'configure');
  render();
}

function toggleApproved(serverId) {
  const s = MCP_SERVERS.find(x => x.id === serverId);
  if (!s) return;
  s.adminApproved = !s.adminApproved;
  render();
}

/* ══ UI CONTROLS ══ */
function toggleView() {
  currentView = currentView === 'cards' ? 'list' : 'cards';
  const icon  = document.getElementById('viewIcon');
  const label = document.getElementById('viewLabel');
  if (currentView === 'list') { icon.setAttribute('data-lucide','list'); label.textContent = 'List'; }
  else { icon.setAttribute('data-lucide','layout-grid'); label.textContent = 'Cards'; }
  lucide.createIcons({ scope: document.getElementById('viewToggleBtn') });
  render();
}

function setScope(s) {
  document.getElementById('scope-mine').classList.toggle('on', s === 'mine');
  document.getElementById('scope-all').classList.toggle('on', s === 'all');
  if (s === 'mine') { currentStab = 'connected'; document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on')); document.querySelector('.stab.st-connected').classList.add('on'); }
  else { currentStab = 'all'; document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on')); document.querySelectorAll('.stab')[0].classList.add('on'); }
  render();
}

function setStab(btn, val) {
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentStab = val;
  render();
}

function toggleFc(btn) { btn.classList.toggle('on'); }
function clearSec(btn) { btn.closest('.sec-label').nextElementSibling?.querySelectorAll('.fc').forEach(f => f.classList.remove('on')); }
function filterServers() { searchQuery = document.getElementById('searchInput').value; render(); }
function toggleSide() { document.getElementById('app').classList.toggle('side-collapsed'); }
function togglePanelCollapse() { document.getElementById('app').classList.toggle('panel-collapsed'); }

function setRole(r) {
  userRole = r;
  document.getElementById('tw-user').classList.toggle('on', r === 'user');
  document.getElementById('tw-admin').classList.toggle('on', r === 'admin');
  const rb = document.getElementById('roleBadge');
  rb.innerHTML = `<i data-lucide="user-circle"></i> Role: ${r === 'admin' ? 'Admin' : 'User'} <i data-lucide="chevron-down"></i>`;
  lucide.createIcons({ scope: rb });
  updateApprovalBadges();
  render();
  if (activeServer) openDetail(activeServer, 'about');
}

function cyclRole() {
  setRole(userRole === 'user' ? 'admin' : 'user');
}

function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('tw-light').classList.toggle('on', t === 'light');
  document.getElementById('tw-dark').classList.toggle('on', t === 'dark');
}

function setDefaultView(v) {
  document.getElementById('tw-cards').classList.toggle('on', v === 'cards');
  document.getElementById('tw-list').classList.toggle('on', v === 'list');
  currentView = v;
  const icon = document.getElementById('viewIcon');
  const label = document.getElementById('viewLabel');
  if (v === 'list') { icon.setAttribute('data-lucide','list'); label.textContent = 'List'; }
  else { icon.setAttribute('data-lucide','layout-grid'); label.textContent = 'Cards'; }
  lucide.createIcons();
  render();
}

function closeTweaks() {
  document.getElementById('tweaksPanel').classList.remove('open');
  window.parent.postMessage({type:'__edit_mode_dismissed'}, '*');
}

window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaksPanel').classList.add('open');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaksPanel').classList.remove('open');
});
window.parent.postMessage({type:'__edit_mode_available'}, '*');

/* ══ INIT ══ */
initBodhiSidebar(document.getElementById('mcpSidebar'), {
  section: 'mcp',
  subPage: 'discover',
});
render();
if (window.innerWidth >= 1100) openDetail(MCP_SERVERS[0], 'about');
</script>
</body>
</html>
