<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bodhi · Access Requests</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="api-keys-shell.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── Request list ── */
.req-list { display: flex; flex-direction: column; gap: 8px; }

.req-card {
  background: hsl(var(--card)); border: 1px solid hsl(var(--border));
  border-radius: 11px; overflow: hidden;
  transition: box-shadow 120ms, border-color 120ms;
}
.req-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.req-card.pending { border-left: 3px solid var(--c-saffron-bd); }
.req-card.approved { border-left: 3px solid var(--c-leaf-bd); }
.req-card.denied   { border-left: 3px solid hsl(var(--border)); }

.req-card-body {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
}

/* App avatar */
.req-app-avatar {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
}

/* Identity */
.req-identity { flex: 1; min-width: 0; }
.req-app-name-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 3px; }
.req-app-name { font-size: 14px; font-weight: 700; }
.req-app-desc { font-size: 12px; color: hsl(var(--muted-foreground)); line-height: 1.45; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Resources summary */
.req-resources { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; min-width: 160px; }
.req-resource-row { display: flex; align-items: center; gap: 5px; font-size: 11.5px; color: hsl(var(--muted-foreground)); }
.req-resource-row svg { width: 12px; height: 12px; opacity: .7; flex-shrink: 0; }

/* Divider */
.req-divider { width: 1px; height: 36px; background: hsl(var(--border)); flex-shrink: 0; }

/* Date */
.req-date { min-width: 90px; text-align: right; flex-shrink: 0; }
.req-date-main { font-size: 12px; color: hsl(var(--muted-foreground)); }
.req-date-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: hsl(var(--muted-foreground)); margin-bottom: 2px; }

/* Actions */
.req-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

/* Status chip */
.req-status {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 9px; border-radius: 99px;
  font-size: 11px; font-weight: 600; border: 1px solid; white-space: nowrap;
}
.req-status.pending  { background: var(--c-saffron-bg); border-color: var(--c-saffron-bd); color: var(--c-saffron-text); }
.req-status.approved { background: var(--c-leaf-bg);    border-color: var(--c-leaf-bd);    color: var(--c-leaf-text); }
.req-status.denied   { background: hsl(var(--muted));   border-color: hsl(var(--border));  color: hsl(var(--muted-foreground)); }

/* Action buttons */
.btn-review {
  height: 30px; padding: 0 13px; border-radius: 7px; font-size: 12px; font-weight: 700;
  background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border: none;
  display: inline-flex; align-items: center; gap: 5px; cursor: pointer; transition: opacity 120ms;
}
.btn-review:hover { opacity: .85; }
.btn-view {
  height: 30px; padding: 0 12px; border-radius: 7px; font-size: 12px; font-weight: 600;
  background: transparent; border: 1.5px solid hsl(var(--border)); color: hsl(var(--muted-foreground));
  display: inline-flex; align-items: center; gap: 5px; cursor: pointer; transition: all 100ms;
}
.btn-view:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }

/* Revoke strip (for approved) */
.req-revoke-row {
  border-top: 1px solid hsl(var(--border)); padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: hsl(var(--muted)); font-size: 11.5px;
  color: hsl(var(--muted-foreground));
}
.btn-revoke-access {
  height: 26px; padding: 0 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  background: transparent; border: 1px solid hsl(var(--border)); color: hsl(var(--muted-foreground));
  display: inline-flex; align-items: center; gap: 4px; cursor: pointer; transition: all 100ms;
}
.btn-revoke-access:hover { border-color: hsl(var(--destructive)); color: hsl(var(--destructive)); background: rgba(220,38,38,.04); }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel" src="bodhi-sidebar-react.jsx"></script>
<script type="text/babel" src="access-requests-app.jsx"></script>
</body>
</html>
