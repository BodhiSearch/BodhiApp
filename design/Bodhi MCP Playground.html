<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bodhi · MCP Playground</title>
<link rel="stylesheet" href="colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="bodhi-sidebar.js"></script>
<style>
:root {
  --c-indigo-bg: rgba(62,74,168,.10); --c-indigo-bd: rgba(62,74,168,.22); --c-indigo-text: #3E4AA8;
  --c-lotus-bg: rgba(255,164,184,.14); --c-lotus-bd: rgba(255,164,184,.35); --c-lotus-text: #B02A52;
  --c-saffron-bg: rgba(250,138,46,.12); --c-saffron-bd: rgba(250,138,46,.28); --c-saffron-text: #B4500A;
  --c-leaf-bg: rgba(91,178,59,.12); --c-leaf-bd: rgba(91,178,59,.28); --c-leaf-text: #2F7D1F;
  --c-connected-bg: rgba(46,188,64,.10); --c-connected-bd: rgba(46,188,64,.25); --c-connected-text: #2a9b36;
}
[data-theme="dark"] {
  --c-indigo-bg: rgba(110,123,204,.18); --c-indigo-bd: rgba(110,123,204,.30); --c-indigo-text: #A5AEE6;
  --c-lotus-bg: rgba(255,164,184,.15); --c-lotus-bd: rgba(255,164,184,.28); --c-lotus-text: #FFA4B8;
  --c-saffron-bg: rgba(250,138,46,.18); --c-saffron-bd: rgba(250,138,46,.30); --c-saffron-text: #FFAB5C;
  --c-leaf-bg: rgba(139,217,99,.16); --c-leaf-bd: rgba(139,217,99,.28); --c-leaf-text: #8BD963;
  --c-connected-bg: rgba(139,217,99,.12); --c-connected-bd: rgba(139,217,99,.25); --c-connected-text: #8BD963;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font-sans); color: hsl(var(--foreground)); background: hsl(var(--background)); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; }

/* ── SHELL ── */
.shell { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 100vh; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.side { background: hsl(var(--card)); border-right: 1px solid hsl(var(--border)); display: flex; flex-direction: column; overflow: hidden; }
.logo { display: flex; align-items: center; gap: 10px; padding: 13px 12px 12px; border-bottom: 1px solid hsl(var(--border)); flex-shrink: 0; }
.logo-t { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }
.logo-s { font-family: var(--font-mono); font-size: 9px; letter-spacing: .14em; color: hsl(var(--muted-foreground)); text-transform: uppercase; margin-top: 2px; }
.side-scroll { flex: 1; overflow-y: auto; padding: 10px 8px 16px; }
.nav-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; color: hsl(var(--muted-foreground)); transition: background 100ms, color 100ms; cursor: pointer; }
.nav-row svg { width: 14px; height: 14px; flex: none; }
.nav-row:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.nav-row.active { background: var(--c-lotus-bg); color: var(--c-lotus-text); font-weight: 600; }
.nav-row .nb { margin-left: auto; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 99px; background: var(--c-lotus-bg); color: var(--c-lotus-text); }
.nav-sub { padding-left: 10px; margin-top: 1px; }
.nav-sub-row { display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 7px; font-size: 12.5px; font-weight: 500; color: hsl(var(--muted-foreground)); transition: background 100ms, color 100ms; cursor: pointer; }
.nav-sub-row:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.nav-sub-row.active { color: var(--c-lotus-text); font-weight: 600; }
.nav-sub-row svg { width: 13px; height: 13px; flex: none; }

/* ── WORKSPACE ── */
.workspace { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 100vh; overflow: hidden; }

/* ── TOPBAR ── */
.topbar { display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1px solid hsl(var(--border)); background: hsl(var(--card)); height: 52px; flex-shrink: 0; grid-column: 1 / -1; }
.breadcrumb { display: flex; align-items: center; gap: 5px; font-size: 12.5px; color: hsl(var(--muted-foreground)); }
.breadcrumb .sep { width: 10px; height: 10px; opacity: .5; }
.breadcrumb .bc-seg { cursor: pointer; }
.breadcrumb .bc-seg:hover { color: hsl(var(--foreground)); }
.breadcrumb .bc-current { font-weight: 700; color: var(--c-lotus-text); }
.topbar-mid { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
.pg-title { font-size: 15px; font-weight: 700; letter-spacing: -.02em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 99px; font-size: 11.5px; font-weight: 600; border: 1px solid; flex-shrink: 0; }
.status-pill.connected { background: var(--c-connected-bg); border-color: var(--c-connected-bd); color: var(--c-connected-text); }
.status-pill.connecting { background: var(--c-saffron-bg); border-color: var(--c-saffron-bd); color: var(--c-saffron-text); }
.status-pill svg { width: 10px; height: 10px; }
.topbar-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.icon-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid hsl(var(--border)); background: transparent; display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground)); transition: all 100ms; }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }

/* ── TOOL SIDEBAR ── */
.tool-sidebar { background: hsl(var(--card)); border-right: 1px solid hsl(var(--border)); display: flex; flex-direction: column; overflow: hidden; }
.ts-header { padding: 12px 14px; border-bottom: 1px solid hsl(var(--border)); flex-shrink: 0; }
.ts-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: hsl(var(--muted-foreground)); margin-bottom: 8px; }
.ts-search { position: relative; }
.ts-search input { width: 100%; height: 30px; padding: 0 8px 0 28px; border: 1px solid hsl(var(--border)); border-radius: 7px; font-size: 12.5px; font-family: inherit; background: hsl(var(--background)); color: hsl(var(--foreground)); outline: none; }
.ts-search input:focus { border-color: hsl(var(--ring)); }
.ts-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; color: hsl(var(--muted-foreground)); pointer-events: none; }
.ts-list { flex: 1; overflow-y: auto; padding: 6px 6px; }
.ts-list::-webkit-scrollbar { width: 4px; }
.ts-list::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 2px; }
.tool-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 80ms; margin-bottom: 2px; border: 1px solid transparent; }
.tool-item:hover { background: hsl(var(--muted)); border-color: hsl(var(--border)); }
.tool-item.active { background: var(--c-lotus-bg); border-color: var(--c-lotus-bd); }
.tool-name { font-size: 12.5px; font-weight: 600; font-family: var(--font-mono); color: hsl(var(--foreground)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tool-item.active .tool-name { color: var(--c-lotus-text); }
.tool-desc-short { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── TOOL DETAIL ── */
.tool-detail { display: flex; flex-direction: column; overflow: hidden; }
.td-inner { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

.td-head { padding: 18px 24px 14px; border-bottom: 1px solid hsl(var(--border)); flex-shrink: 0; }
.td-tool-name { font-size: 18px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -.02em; margin-bottom: 4px; }
.td-tool-desc { font-size: 13px; color: hsl(var(--muted-foreground)); line-height: 1.55; }

.td-tabs { display: flex; border-bottom: 1px solid hsl(var(--border)); padding: 0 24px; flex-shrink: 0; }
.tdtab { padding: 9px 0; margin-right: 20px; font-size: 13px; font-weight: 500; color: hsl(var(--muted-foreground)); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 100ms; }
.tdtab:hover { color: hsl(var(--foreground)); }
.tdtab.on { color: hsl(var(--foreground)); border-bottom-color: #FFA4B8; font-weight: 600; }

.td-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.td-body::-webkit-scrollbar { width: 5px; }
.td-body::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 3px; }

/* ── FORM TAB ── */
.form-tab { padding: 20px 24px; flex: 1; }
.form-field { margin-bottom: 16px; }
.form-label { font-size: 12.5px; font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.form-label .req { color: #DB456C; }
.form-label .type-badge { font-size: 10.5px; font-weight: 500; padding: 1px 6px; border-radius: 4px; background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); font-family: var(--font-mono); }
.form-input { width: 100%; height: 36px; padding: 0 10px; border: 1px solid hsl(var(--border)); border-radius: 8px; font-size: 13.5px; font-family: inherit; background: hsl(var(--card)); color: hsl(var(--foreground)); outline: none; transition: border-color 150ms, box-shadow 150ms; }
.form-input:focus { border-color: hsl(var(--ring)); box-shadow: 0 0 0 3px rgba(255,164,184,.15); }
.form-input::placeholder { color: hsl(var(--muted-foreground)); }
.form-input.mono { font-family: var(--font-mono); }
.form-textarea { width: 100%; min-height: 80px; padding: 8px 10px; border: 1px solid hsl(var(--border)); border-radius: 8px; font-size: 13px; font-family: var(--font-mono); background: hsl(var(--card)); color: hsl(var(--foreground)); outline: none; resize: vertical; transition: border-color 150ms; }
.form-textarea:focus { border-color: hsl(var(--ring)); }
.form-hint { font-size: 11.5px; color: hsl(var(--muted-foreground)); margin-top: 3px; }

.execute-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.btn-execute { height: 38px; padding: 0 22px; border-radius: 9px; background: var(--c-indigo-text); color: #fff; border: none; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 7px; transition: all 150ms; }
.btn-execute:hover { background: var(--c-indigo-bg); color: var(--c-indigo-text); border: 1px solid var(--c-indigo-bd); }
.btn-execute:disabled { opacity: .5; cursor: not-allowed; }
.btn-execute svg { width: 14px; height: 14px; }
.btn-clear { height: 38px; padding: 0 14px; border-radius: 9px; background: transparent; border: 1px solid hsl(var(--border)); color: hsl(var(--muted-foreground)); font-size: 13px; transition: all 100ms; }
.btn-clear:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }

/* ── RESULT AREA ── */
.result-area { border-top: 1px solid hsl(var(--border)); flex-shrink: 0; min-height: 220px; display: flex; flex-direction: column; }
.result-tabs { display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid hsl(var(--border)); gap: 4px; }
.result-status { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 12.5px; font-weight: 700; margin-right: 6px; }
.result-status.success { background: var(--c-connected-bg); color: var(--c-connected-text); }
.result-status.error { background: rgba(220,50,50,.1); color: #c93030; }
.result-status.idle { background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }
.result-status svg { width: 12px; height: 12px; }
.rtab { padding: 8px 10px; font-size: 12.5px; font-weight: 500; color: hsl(var(--muted-foreground)); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 100ms; }
.rtab:hover { color: hsl(var(--foreground)); }
.rtab.on { color: hsl(var(--foreground)); border-bottom-color: #FFA4B8; font-weight: 600; }
.rtab-copy { margin-left: auto; width: 28px; height: 28px; border-radius: 6px; border: 1px solid hsl(var(--border)); background: transparent; display: flex; align-items: center; justify-content: center; color: hsl(var(--muted-foreground)); transition: all 100ms; }
.rtab-copy:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
.rtab-copy svg { width: 13px; height: 13px; }
.result-body { flex: 1; padding: 14px 24px; overflow-y: auto; }
.result-body::-webkit-scrollbar { width: 4px; }
.result-body::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 2px; }
.result-code { font-family: var(--font-mono); font-size: 12.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
.result-code .json-key { color: var(--c-indigo-text); }
.result-code .json-str { color: var(--c-connected-text); }
.result-code .json-num { color: var(--c-saffron-text); }
.result-code .json-bool { color: var(--c-lotus-text); }
.result-code .json-null { color: hsl(var(--muted-foreground)); }
.result-idle { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 8px; color: hsl(var(--muted-foreground)); text-align: center; }
.result-idle svg { width: 28px; height: 28px; opacity: .2; }
.result-idle .ri-t { font-size: 13px; font-weight: 600; }
.result-idle .ri-s { font-size: 12px; }

/* ── JSON TAB ── */
.json-tab { padding: 16px 24px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.json-tab textarea { flex: 1; min-height: 160px; width: 100%; padding: 10px 12px; border: 1px solid hsl(var(--border)); border-radius: 9px; font-family: var(--font-mono); font-size: 13px; background: hsl(var(--card)); color: hsl(var(--foreground)); outline: none; resize: none; transition: border-color 150ms; line-height: 1.6; }
.json-tab textarea:focus { border-color: hsl(var(--ring)); }

/* ── EMPTY STATE ── */
.tool-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 10px; color: hsl(var(--muted-foreground)); text-align: center; padding: 40px; }
.tool-empty svg { width: 40px; height: 40px; opacity: .15; }
.tool-empty .te-t { font-size: 14px; font-weight: 600; }
.tool-empty .te-s { font-size: 13px; }

/* connecting spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
.pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

/* ── EXECUTION LOG ── */
.exec-log { position: fixed; bottom: 20px; right: 20px; width: 320px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 100; display: none; flex-direction: column; overflow: hidden; max-height: 260px; }
.exec-log.open { display: flex; }
.exec-log-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid hsl(var(--border)); font-size: 12px; font-weight: 700; }
.exec-log-body { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--font-mono); font-size: 11.5px; line-height: 1.7; color: hsl(var(--muted-foreground)); }
.log-line.success { color: var(--c-connected-text); }
.log-line.error { color: #c93030; }
.log-line.info { color: var(--c-indigo-text); }

@media (max-width: 900px) {
  .shell { grid-template-columns: 1fr; }
  .side { display: none; }
  .workspace { grid-template-columns: 1fr; }
  .tool-sidebar { display: none; }
}
</style>
</head>
<body>
<div class="shell">
  <!-- NAV SIDEBAR -->
  <aside class="side" id="playgroundSidebar">
    <div class="side-scroll"></div>
  </aside>

  <!-- WORKSPACE -->
  <div class="workspace" id="workspace" style="display:flex;flex-direction:column;">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="breadcrumb">
        <span class="bc-seg" onclick="location.href='Bodhi MCP Discover v2.html'">MCP</span>
        <i data-lucide="chevron-right" class="sep"></i>
        <span class="bc-seg" onclick="history.back()">My Instances</span>
        <i data-lucide="chevron-right" class="sep"></i>
        <span class="bc-current">Playground</span>
      </div>
      <div class="topbar-mid">
        <div class="pg-title" id="pgTitle">— Playground</div>
        <div class="status-pill connecting" id="statusPill">
          <div class="spinner"></div> Connecting…
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Reconnect" onclick="reconnect()"><i data-lucide="refresh-cw"></i></button>
        <button class="icon-btn" title="Settings" onclick=""><i data-lucide="settings-2"></i></button>
        <button class="icon-btn" title="Execution log" onclick="toggleLog()"><i data-lucide="terminal"></i></button>
      </div>
    </div>

    <!-- WORKSPACE INNER -->
    <div style="display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden;">
      <!-- TOOL SIDEBAR -->
      <div class="tool-sidebar">
        <div class="ts-header">
          <div class="ts-label">Tools <span id="toolCount" style="font-style:normal;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;background:hsl(var(--muted));color:hsl(var(--muted-foreground))"></span></div>
          <div class="ts-search">
            <i data-lucide="search"></i>
            <input type="text" placeholder="Search tools…" oninput="filterTools(this.value)">
          </div>
        </div>
        <div class="ts-list" id="toolList"></div>
      </div>

      <!-- TOOL DETAIL -->
      <div class="tool-detail" id="toolDetail">
        <div class="tool-empty">
          <i data-lucide="wrench"></i>
          <div class="te-t">Select a tool</div>
          <div class="te-s">Choose a tool from the list to explore its parameters and try it out</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Execution Log -->
<div class="exec-log" id="execLog">
  <div class="exec-log-head">
    Execution Log
    <button style="background:none;border:none;border-radius:5px;padding:2px;color:hsl(var(--muted-foreground));cursor:pointer" onclick="toggleLog()"><i data-lucide="x" style="width:13px;height:13px"></i></button>
  </div>
  <div class="exec-log-body" id="execLogBody"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   SERVER TOOL DATA
═══════════════════════════════════════════ */
const SERVER_TOOLS = {
  deepwiki: [
    {
      name: 'read_wiki_structure',
      desc: 'Get a list of documentation topics for a GitHub repository.',
      params: [
        { name: 'repoName', type: 'string', required: true, desc: 'GitHub repository in owner/repo format (e.g. "facebook/react")', placeholder: 'facebook/react' },
      ],
      mockResponse: JSON.stringify([
        { type: 'text', text: 'Available pages for facebook/react:\n\n- 1 Overview\n- 2 Architecture\n- 3 Reconciler\n- 4 Hooks\n- 5 Concurrent Mode\n- 6 Server Components\n- 7 Testing' }
      ], null, 2),
    },
    {
      name: 'read_wiki_contents',
      desc: 'View documentation about a GitHub repository or a specific topic.',
      params: [
        { name: 'repoName', type: 'string', required: true, desc: 'GitHub repository in owner/repo format', placeholder: 'facebook/react' },
        { name: 'topic', type: 'string', required: false, desc: 'Specific topic page to read', placeholder: 'Hooks' },
      ],
      mockResponse: JSON.stringify({ type: 'text', text: 'React Hooks allow you to use state and other React features without writing a class component...' }, null, 2),
    },
    {
      name: 'ask_question',
      desc: 'Ask any question about a GitHub repository.',
      params: [
        { name: 'repoName', type: 'string', required: true, desc: 'GitHub repository in owner/repo format', placeholder: 'facebook/react' },
        { name: 'question', type: 'string', required: true, desc: 'Your question about the repository', placeholder: 'How does the reconciler work?' },
      ],
      mockResponse: JSON.stringify({ type: 'text', text: 'The React reconciler determines what needs to change in the UI by comparing the current virtual DOM tree with the new one (diffing). It uses a heuristic O(n) algorithm...' }, null, 2),
    },
  ],
  notion: [
    {
      name: 'notion-search',
      desc: 'Perform a search across Notion — "internal" Search api.',
      params: [
        { name: 'query', type: 'string', required: true, desc: 'Search query string', placeholder: 'Project notes' },
        { name: 'filter', type: 'string', required: false, desc: 'Filter by "page" or "database"', placeholder: 'page' },
      ],
      mockResponse: JSON.stringify({ results: [{ id: 'abc123', title: 'Q1 Project Notes', type: 'page' }, { id: 'def456', title: 'Meeting Notes', type: 'page' }] }, null, 2),
    },
    {
      name: 'notion-fetch',
      desc: 'Retrieves details about a Notion entity (page, database, block).',
      params: [
        { name: 'pageId', type: 'string', required: true, desc: 'The Notion page or block ID', placeholder: 'abc123def456' },
      ],
      mockResponse: JSON.stringify({ id: 'abc123', object: 'page', properties: { title: { title: [{ text: { content: 'My Page' } }] } } }, null, 2),
    },
    {
      name: 'notion-create-pages',
      desc: 'Overview: creates one or more Notion pages with given properties.',
      params: [
        { name: 'parent_id', type: 'string', required: true, desc: 'Parent page or database ID', placeholder: 'abc123' },
        { name: 'title', type: 'string', required: true, desc: 'Page title', placeholder: 'My new page' },
        { name: 'content', type: 'string', required: false, desc: 'Initial page content in markdown', placeholder: '## Hello\nThis is my page.' },
      ],
      mockResponse: JSON.stringify({ id: 'new-page-id', object: 'page', created_time: '2026-05-06T14:00:00Z', url: 'https://notion.so/My-new-page' }, null, 2),
    },
    {
      name: 'notion-update-page',
      desc: 'Overview: update a Notion page properties.',
      params: [
        { name: 'page_id', type: 'string', required: true, desc: 'The Notion page ID to update', placeholder: 'abc123' },
        { name: 'title', type: 'string', required: false, desc: 'New page title', placeholder: 'Updated title' },
      ],
      mockResponse: JSON.stringify({ id: 'abc123', object: 'page', last_edited_time: '2026-05-06T15:00:00Z' }, null, 2),
    },
    {
      name: 'notion-delete',
      desc: 'Archive or permanently delete a Notion block or page.',
      params: [
        { name: 'block_id', type: 'string', required: true, desc: 'The Notion block or page ID to delete', placeholder: 'abc123' },
      ],
      mockResponse: JSON.stringify({ id: 'abc123', object: 'page', archived: true }, null, 2),
    },
  ],
  exa: [
    {
      name: 'exa-search',
      desc: 'Perform a semantic web search using Exa.',
      params: [
        { name: 'query', type: 'string', required: true, desc: 'Search query', placeholder: 'latest AI model benchmarks 2026' },
        { name: 'num_results', type: 'number', required: false, desc: 'Number of results to return (default 10)', placeholder: '10' },
        { name: 'type', type: 'string', required: false, desc: '"keyword" or "neural" (default "neural")', placeholder: 'neural' },
      ],
      mockResponse: JSON.stringify({ results: [{ url: 'https://arxiv.org/abs/2405.0001', title: 'GPT-5 Benchmark Results', score: 0.97 }, { url: 'https://huggingface.co/blog/evals', title: 'Open LLM Leaderboard 2026', score: 0.94 }] }, null, 2),
    },
    {
      name: 'exa-get-contents',
      desc: 'Retrieve contents of specific URLs.',
      params: [
        { name: 'urls', type: 'string', required: true, desc: 'Comma-separated list of URLs to fetch', placeholder: 'https://example.com' },
      ],
      mockResponse: JSON.stringify([{ url: 'https://example.com', text: 'Example Domain\nThis domain is for use in illustrative examples...' }], null, 2),
    },
    {
      name: 'exa-find-similar',
      desc: 'Find pages similar to a given URL.',
      params: [
        { name: 'url', type: 'string', required: true, desc: 'URL to find similar pages for', placeholder: 'https://arxiv.org/abs/2405.0001' },
        { name: 'num_results', type: 'number', required: false, desc: 'Number of results', placeholder: '5' },
      ],
      mockResponse: JSON.stringify({ results: [{ url: 'https://arxiv.org/abs/2405.0002', title: 'Related Paper', score: 0.91 }] }, null, 2),
    },
  ],
};

// Default tools for unknown servers
const DEFAULT_TOOLS = [
  { name: 'list_tools', desc: 'List all available tools on this MCP server.', params: [], mockResponse: JSON.stringify({ tools: ['list_tools', 'ping', 'echo'] }, null, 2) },
  { name: 'ping', desc: 'Check connectivity to the MCP server.', params: [], mockResponse: JSON.stringify({ status: 'ok', latency_ms: 42 }, null, 2) },
  { name: 'echo', desc: 'Echo back the provided message.', params: [{ name: 'message', type: 'string', required: true, desc: 'Message to echo back', placeholder: 'Hello, world!' }], mockResponse: JSON.stringify({ echo: 'Hello, world!' }, null, 2) },
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let instanceId = '';
let instanceName = 'playground';
let serverId = 'deepwiki';
let tools = [];
let filteredTools = [];
let activeTool = null;
let activeTab = 'form'; // 'form' | 'json'
let activeResultTab = 'response';
let lastResult = null;
let logLines = [];
let formValues = {};

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function init() {
  const params = new URLSearchParams(window.location.search);
  instanceId   = params.get('instance') || 'inst-1';
  instanceName = params.get('name')     || 'my-instance';
  serverId     = params.get('server')   || 'deepwiki';

  document.getElementById('pgTitle').textContent = `${instanceName} — Playground`;
  document.title = `Bodhi · ${instanceName} Playground`;

  tools = SERVER_TOOLS[serverId] || DEFAULT_TOOLS;
  filteredTools = [...tools];

  renderToolList();
  simulateConnect();
}

function simulateConnect() {
  addLog('info', `Connecting to ${serverId} MCP server…`);
  setTimeout(() => {
    document.getElementById('statusPill').className = 'status-pill connected';
    document.getElementById('statusPill').innerHTML = `<i data-lucide="circle-check" style="width:10px;height:10px"></i> Connected`;
    lucide.createIcons({ scope: document.getElementById('statusPill') });
    document.getElementById('toolCount').textContent = tools.length;
    addLog('success', `Connected · ${tools.length} tools available`);
    addLog('info', `Instance: ${instanceName}`);
    // Open first tool
    if (tools.length) openTool(tools[0]);
  }, 900);
}

function reconnect() {
  const pill = document.getElementById('statusPill');
  pill.className = 'status-pill connecting';
  pill.innerHTML = `<div class="spinner"></div> Reconnecting…`;
  addLog('info', 'Reconnecting…');
  setTimeout(() => {
    pill.className = 'status-pill connected';
    pill.innerHTML = `<i data-lucide="circle-check" style="width:10px;height:10px"></i> Connected`;
    lucide.createIcons({ scope: pill });
    addLog('success', 'Reconnected successfully');
  }, 1100);
}

/* ═══════════════════════════════════════════
   TOOL LIST
═══════════════════════════════════════════ */
function renderToolList() {
  const list = document.getElementById('toolList');
  list.innerHTML = filteredTools.map(t => `
    <div class="tool-item${activeTool?.name === t.name ? ' active' : ''}" onclick="openTool(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc-short">${t.desc}</div>
    </div>`).join('');
}

function filterTools(q) {
  filteredTools = q ? tools.filter(t => t.name.includes(q) || t.desc.toLowerCase().includes(q.toLowerCase())) : [...tools];
  renderToolList();
}

/* ═══════════════════════════════════════════
   TOOL DETAIL
═══════════════════════════════════════════ */
function openTool(t) {
  activeTool = t;
  activeTab = 'form';
  activeResultTab = 'response';
  lastResult = null;
  formValues = {};
  renderToolList();
  renderToolDetail();
}

function renderToolDetail() {
  const t = activeTool;
  if (!t) return;
  const detail = document.getElementById('toolDetail');
  detail.innerHTML = `
    <div class="td-inner">
      <div class="td-head">
        <div class="td-tool-name">${t.name}</div>
        <div class="td-tool-desc">${t.desc}</div>
      </div>
      <div class="td-tabs">
        <button class="tdtab${activeTab==='form'?' on':''}" onclick="switchTab('form')">Form</button>
        <button class="tdtab${activeTab==='json'?' on':''}" onclick="switchTab('json')">JSON</button>
      </div>
      <div class="td-body" id="tdBody">
        ${activeTab === 'form' ? renderFormTab(t) : renderJsonTab(t)}
      </div>
      <div class="result-area" id="resultArea">
        ${renderResultArea()}
      </div>
    </div>`;
  lucide.createIcons({ scope: detail });
}

function renderFormTab(t) {
  if (!t.params.length) {
    return `<div class="form-tab">
      <div style="font-size:13px;color:hsl(var(--muted-foreground));padding:8px 0;margin-bottom:16px">This tool takes no parameters.</div>
      <div class="execute-row">
        <button class="btn-execute" onclick="executeTool()"><i data-lucide="play"></i> Execute</button>
      </div>
    </div>`;
  }
  return `<div class="form-tab">
    ${t.params.map(p => `
      <div class="form-field">
        <div class="form-label">
          ${p.name} ${p.required ? '<span class="req">*</span>' : ''}
          <span class="type-badge">${p.type}</span>
        </div>
        <input class="form-input${p.type==='string'&&(p.name.includes('id')||p.name.includes('url'))?'':''}"
          id="param-${p.name}"
          placeholder="${p.placeholder || ''}"
          value="${formValues[p.name] || ''}"
          oninput="formValues['${p.name}']=this.value">
        <div class="form-hint">${p.desc}</div>
      </div>`).join('')}
    <div class="execute-row">
      <button class="btn-execute" onclick="executeTool()"><i data-lucide="play"></i> Execute</button>
      <button class="btn-clear" onclick="clearForm()">Clear</button>
    </div>
  </div>`;
}

function renderJsonTab(t) {
  const obj = {};
  t.params.forEach(p => { if (p.required) obj[p.name] = formValues[p.name] || (p.type === 'number' ? 0 : ''); });
  return `<div class="json-tab">
    <textarea id="jsonInput" placeholder='${JSON.stringify(obj, null, 2)}'>${Object.keys(formValues).length ? JSON.stringify(Object.fromEntries(t.params.map(p => [p.name, formValues[p.name] || ''])), null, 2) : ''}</textarea>
    <div class="execute-row">
      <button class="btn-execute" onclick="executeTool()"><i data-lucide="play"></i> Execute</button>
      <button class="btn-clear" onclick="clearForm()">Clear</button>
    </div>
  </div>`;
}

function renderResultArea() {
  return `
    <div class="result-tabs">
      <span class="result-status ${lastResult ? (lastResult.ok ? 'success' : 'error') : 'idle'}">
        ${lastResult ? (lastResult.ok ? '<i data-lucide="check" style="width:11px;height:11px"></i> Success' : '<i data-lucide="x" style="width:11px;height:11px"></i> Error') : '—'}
      </span>
      <button class="rtab${activeResultTab==='response'?' on':''}" onclick="setResultTab('response')">Response</button>
      <button class="rtab${activeResultTab==='raw'?' on':''}" onclick="setResultTab('raw')">Raw JSON</button>
      <button class="rtab${activeResultTab==='request'?' on':''}" onclick="setResultTab('request')">Request</button>
      <button class="rtab-copy" onclick="copyResult()" title="Copy"><i data-lucide="copy"></i></button>
    </div>
    <div class="result-body" id="resultBody">
      ${renderResultBody()}
    </div>`;
}

function renderResultBody() {
  if (!lastResult) {
    return `<div class="result-idle">
      <i data-lucide="play-circle"></i>
      <div class="ri-t">No result yet</div>
      <div class="ri-s">Fill in the parameters above and click Execute</div>
    </div>`;
  }
  if (activeResultTab === 'response') {
    return `<pre class="result-code">${syntaxHighlight(lastResult.response)}</pre>`;
  }
  if (activeResultTab === 'raw') {
    return `<pre class="result-code">${escapeHtml(lastResult.raw)}</pre>`;
  }
  if (activeResultTab === 'request') {
    return `<pre class="result-code">${syntaxHighlight(JSON.stringify(lastResult.request, null, 2))}</pre>`;
  }
  return '';
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tdtab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tdtab')[tab==='form'?0:1].classList.add('on');
  const body = document.getElementById('tdBody');
  body.innerHTML = tab === 'form' ? renderFormTab(activeTool) : renderJsonTab(activeTool);
  lucide.createIcons({ scope: body });
}

function setResultTab(tab) {
  activeResultTab = tab;
  const area = document.getElementById('resultArea');
  area.innerHTML = renderResultArea();
  lucide.createIcons({ scope: area });
}

/* ═══════════════════════════════════════════
   EXECUTION
═══════════════════════════════════════════ */
function executeTool() {
  if (!activeTool) return;

  // Validate required
  let valid = true;
  if (activeTab === 'form') {
    activeTool.params.forEach(p => {
      const val = formValues[p.name] || document.getElementById(`param-${p.name}`)?.value || '';
      formValues[p.name] = val;
      if (p.required && !val) {
        valid = false;
        const el = document.getElementById(`param-${p.name}`);
        if (el) { el.style.borderColor = 'hsl(var(--destructive))'; setTimeout(() => el.style.borderColor = '', 2000); }
      }
    });
  }
  if (!valid) { addLog('error', 'Missing required parameters'); return; }

  // Build request
  const reqParams = {};
  activeTool.params.forEach(p => { if (formValues[p.name]) reqParams[p.name] = formValues[p.name]; });
  const request = { tool: activeTool.name, params: reqParams };

  addLog('info', `Executing ${activeTool.name}…`);

  // Show loading in result
  const area = document.getElementById('resultArea');
  area.innerHTML = `<div class="result-tabs">
    <span class="result-status idle"><div class="spinner"></div> Executing…</span>
  </div>
  <div class="result-body" style="display:flex;align-items:center;justify-content:center;padding:30px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;color:hsl(var(--muted-foreground))">
      <div style="width:30px;height:30px;border:3px solid var(--c-indigo-bd);border-top-color:var(--c-indigo-text);border-radius:50%;animation:spin 0.7s linear infinite"></div>
      <div style="font-size:13px">Running <span style="font-family:var(--font-mono)">${activeTool.name}</span>…</div>
    </div>
  </div>`;

  setTimeout(() => {
    const ok = true; // Always succeed in mock
    lastResult = {
      ok,
      response: activeTool.mockResponse,
      raw: activeTool.mockResponse,
      request,
    };
    const area2 = document.getElementById('resultArea');
    if (area2) {
      area2.innerHTML = renderResultArea();
      lucide.createIcons({ scope: area2 });
    }
    addLog('success', `${activeTool.name} executed · 200 OK · 214ms`);
  }, 650 + Math.random() * 400);
}

function clearForm() {
  formValues = {};
  activeTool.params.forEach(p => {
    const el = document.getElementById(`param-${p.name}`);
    if (el) el.value = '';
  });
  const jsonIn = document.getElementById('jsonInput');
  if (jsonIn) jsonIn.value = '';
}

function copyResult() {
  if (!lastResult) return;
  navigator.clipboard?.writeText(lastResult.raw).then(() => addLog('info', 'Result copied to clipboard'));
}

/* ═══════════════════════════════════════════
   SYNTAX HIGHLIGHTING
═══════════════════════════════════════════ */
function syntaxHighlight(json) {
  if (typeof json !== 'string') json = JSON.stringify(json, null, 2);
  return escapeHtml(json).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) return `<span class="json-key">${match}</span>`;
        return `<span class="json-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
      if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
      return `<span class="json-num">${match}</span>`;
    }
  );
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ═══════════════════════════════════════════
   LOG
═══════════════════════════════════════════ */
function addLog(type, msg) {
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  logLines.push({ type, msg, ts });
  const body = document.getElementById('execLogBody');
  if (body) {
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.textContent = `${ts}  ${msg}`;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  }
}

function toggleLog() {
  document.getElementById('execLog').classList.toggle('open');
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
initBodhiSidebar(document.getElementById('playgroundSidebar'), {
  section: 'mcp', subPage: 'my-instances',
});
init();
</script>
