<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bodhi · Reset password</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <script src="bodhi-theme.js"></script>
  <link rel="stylesheet" href="bodhi-auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- ════════════ Keycloak template: login-reset-password.ftl ════════════ -->
  <div class="ba-page">
    <div class="ba-watermark"></div>
    <button class="ba-theme-toggle" id="ba-theme" aria-label="Toggle light or dark theme">
      <i data-lucide="moon"></i><span class="ba-tt-label">Dark</span>
    </button>

    <div class="ba-card" data-kc-page="login-reset-password.ftl">
      <div class="ba-brand">
        <div class="ba-brand-mark"></div>
        <div class="ba-brand-word">B<span class="om">O</span>DHI</div>
      </div>

      <div class="ba-head">
        <h1 class="ba-title">Reset your password</h1>
        <p class="ba-sub">Enter the email or username on your account and we’ll send a link to set a new password.</p>
      </div>

      <form class="ba-form" id="kc-reset-password-form" onsubmit="return false">
        <div class="ba-group">
          <label class="ba-label" for="reset-username">Email or username</label>
          <input class="ba-input" id="reset-username" name="username" type="text" autocomplete="username" autofocus data-kc-field="username" placeholder="you@example.com">
        </div>
        <button class="ba-btn ba-btn-primary ba-btn-block" type="submit">Send reset link</button>
      </form>

      <div class="ba-foot">
        <a href="login.html" data-kc-link="login"><i data-lucide="arrow-left" style="width:13px;height:13px;vertical-align:-2px"></i> Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="bodhi-auth.js"></script>
  <script src="bodhi-select.js"></script>
</body>
</html>
