<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bodhi · Set a new password</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <script src="bodhi-theme.js"></script>
  <link rel="stylesheet" href="bodhi-auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- ════════════ Keycloak template: login-update-password.ftl ════════════ -->
  <div class="ba-page">
    <div class="ba-watermark"></div>
    <button class="ba-theme-toggle" id="ba-theme" aria-label="Toggle light or dark theme">
      <i data-lucide="moon"></i><span class="ba-tt-label">Dark</span>
    </button>

    <div class="ba-card" data-kc-page="login-update-password.ftl">
      <div class="ba-brand">
        <div class="ba-brand-mark"></div>
        <div class="ba-brand-word">B<span class="om">O</span>DHI</div>
      </div>

      <div class="ba-head">
        <h1 class="ba-title">Set a new password</h1>
        <p class="ba-sub">Choose a strong password you haven’t used before.</p>
      </div>

      <form class="ba-form" id="kc-passwd-update-form" onsubmit="return false">
        <div class="ba-group">
          <label class="ba-label" for="password-new">New password <span class="ba-req">*</span></label>
          <div class="ba-pw-wrap">
            <input class="ba-input" id="password-new" name="password-new" type="password" autocomplete="new-password" autofocus data-kc-field="password-new" data-meter placeholder="Enter new password">
            <button type="button" class="ba-pw-toggle" data-pw-toggle aria-label="Show password"><i data-lucide="eye"></i></button>
          </div>
          <div class="ba-meter" data-meter-bar><span class="ba-meter-seg"></span><span class="ba-meter-seg"></span><span class="ba-meter-seg"></span><span class="ba-meter-seg"></span></div>
          <div class="ba-meter-label" data-meter-label>At least 8 characters.</div>
        </div>
        <div class="ba-group">
          <label class="ba-label" for="password-confirm">Confirm password <span class="ba-req">*</span></label>
          <div class="ba-pw-wrap">
            <input class="ba-input" id="password-confirm" name="password-confirm" type="password" autocomplete="new-password" data-kc-field="password-confirm" placeholder="Re-enter new password">
            <button type="button" class="ba-pw-toggle" data-pw-toggle aria-label="Show password"><i data-lucide="eye"></i></button>
          </div>
        </div>
        <label class="ba-check" style="margin-top:2px">
          <input class="ba-checkbox" type="checkbox" id="logout-sessions" name="logout-sessions" checked data-kc-field="logout-sessions">
          <span class="ba-check-label">Sign out of other devices</span>
        </label>
        <button class="ba-btn ba-btn-primary ba-btn-block" type="submit">Save password</button>
      </form>
    </div>
  </div>

  <script src="bodhi-auth.js"></script>
</body>
</html>
